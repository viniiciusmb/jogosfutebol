<script>
(function(){
  "use strict";

  const CAT_LABEL={"copa-do-mundo":"Copa do Mundo FIFA","libertadores":"Copa Libertadores","champions":"Champions League","brasileirao":"Nacional","classicos":"Clássico Histórico"};
  const LVL_ICON={"LENDÁRIO":"🔥","ÉPICO":"⚡","DRAMÁTICO":"💥"};
  const TYPE_ICON={"gol":"⚽","amarelo":"🟨","vermelho":"🟥","sub":"🔄"};
  const TYPE_LABEL={"gol":"Gol","amarelo":"Cartão","vermelho":"Expulsão","sub":"Substituição"};

  /* ---- color utils ---- */
  function shade(hex,pct){const c=hex.replace('#','');const n=parseInt(c,16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;r=Math.max(0,Math.min(255,r+Math.round(255*pct/100)));g=Math.max(0,Math.min(255,g+Math.round(255*pct/100)));b=Math.max(0,Math.min(255,b+Math.round(255*pct/100)));return`rgb(${r},${g},${b})`;}
  function contrast(hex){const c=hex.replace('#','');const n=parseInt(c,16);const r=(n>>16)&255,g=(n>>8)&255,b=n&255;return (0.299*r+0.587*g+0.114*b)>150?'#0b1020':'#fff';}
  function initials(name){return name.split(/\s|-/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
  function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  /* ---- formation coordinates (percentages) ---- */
  // retorna array de {x,y} para 11 jogadores conforme formação; y=0 topo (gol), y=100 base (ataque)
  function formationCoords(form){
    const rowsMap={
      "4-4-2":[[50],[16,38,62,84],[16,38,62,84],[35,65]],
      "4-3-3":[[50],[16,38,62,84],[26,50,74],[20,50,80]],
      "3-5-2":[[50],[25,50,75],[12,32,50,68,88],[35,65]],
      "4-2-3-1":[[50],[16,38,62,84],[38,62],[22,50,78],[50]],
      "4-5-1":[[50],[16,38,62,84],[12,32,50,68,88],[50]],
      "4-2-4":[[50],[16,38,62,84],[38,62],[16,38,62,84]]
    };
    const rows=rowsMap[form]||rowsMap["4-4-2"];
    const coords=[];
    const n=rows.length;
    rows.forEach((row,ri)=>{
      const y = 8 + (ri/(n-1))*84; // distribui do gol ao ataque
      row.forEach(x=> coords.push({x,y}));
    });
    return coords.slice(0,11);
  }

  function pitchHTML(form, titulares, color){
    const coords=formationCoords(form);
    const txt=contrast(color);
    let players="";
    titulares.forEach((name,i)=>{
      const c=coords[i]||{x:50,y:50};
      players+=`<div class="player" style="left:${c.x}%;top:${c.y}%">
        <span class="num" style="background:${color};color:${txt}">${i+1}</span>
        <span class="pn">${esc(name.split(' ').slice(-1)[0])}</span>
      </div>`;
    });
    return `<div class="pitch">
      <div class="lines">
        <div class="center-line"></div><div class="center-circle"></div>
        <div class="box top"></div><div class="box bot"></div>
      </div>
      ${players}
    </div>`;
  }

  function lineupCard(team, esc_, side){
    const color=team.cor;
    return `<div class="lineup-card">
      <div class="lineup-head">
        <div class="lh-left">
          <span class="dot" style="background:linear-gradient(135deg,${color},${shade(color,-20)})"></span>
          <div>
            <div class="team">${esc(team.nome)}</div>
            <div class="form">${side}</div>
          </div>
        </div>
        <span class="formation-badge">${esc(esc_.formacao)}</span>
      </div>
      ${pitchHTML(esc_.formacao, esc_.titulares, color)}
      <div class="bench">
        <h4><i class="fa-solid fa-users"></i> Reservas</h4>
        <div class="subs">${esc_.reservas.map(r=>`<span class="sub">${esc(r)}</span>`).join('')}</div>
      </div>
      <div class="coach"><i class="fa-solid fa-clipboard-user"></i><span>Técnico:</span> <b>${esc(esc_.tecnico)}</b></div>
    </div>`;
  }

  function timelineHTML(gols, g){
    if(!gols||!gols.length) return `<p style="color:var(--muted)">Sem lances registrados para esta partida.</p>`;
    return `<div class="timeline">`+gols.map(ev=>{
      const isA = ev.time===g.timeA.nome;
      const col = isA? g.timeA.cor : g.timeB.cor;
      const t = ev.tipo;
      return `<div class="tl-item ${t}">
        <span class="dot">${TYPE_ICON[t]||'•'}</span>
        <span class="tl-min">${ev.minuto}'</span>
        <div class="tl-body">
          <div class="tl-player">${esc(ev.jogador)}</div>
          <div class="tl-team"><span class="tcolor" style="background:${col}"></span>${esc(ev.time)}</div>
        </div>
        <span class="tl-type type-${t}">${TYPE_LABEL[t]||t}</span>
      </div>`;
    }).join('')+`</div>`;
  }

  function playerCard(p, g){
    // cor pelo clube se bater com um dos times, senão accent
    let col=var_accent;
    if(p.clube===g.timeA.nome) col=g.timeA.cor;
    else if(p.clube===g.timeB.nome) col=g.timeB.cor;
    return `<div class="pcard">
      <div class="ptop">
        <span class="avatar" style="background:linear-gradient(135deg,${col},${shade(col,-22)});color:${contrast(col)}">${initials(p.nome)}</span>
        <div>
          <div class="pname">${esc(p.nome)}</div>
          <div class="prole">${esc(p.posicao)} · ${esc(p.clube)}</div>
        </div>
      </div>
      <div class="pstats">
        <div class="pstat"><div class="pv">${p.gols}</div><div class="pk">Gols</div></div>
        <div class="pstat"><div class="pv">${p.assistencias}</div><div class="pk">Assist.</div></div>
        <div class="pstat"><div class="pv">${p.nota}</div><div class="pk">Nota</div></div>
      </div>
      <p class="pquote">"${esc(p.frase)}"</p>
    </div>`;
  }
  const var_accent="#F5A623";

  function championHTML(c, g){
    return `<div class="champion">
      <div class="ch-label"><i class="fa-solid fa-trophy"></i> Campeão da competição</div>
      <div class="ch-team">${esc(c.time)}</div>
      <div class="ch-grid">
        <div class="ch-cell"><div class="k"><i class="fa-solid fa-futbol"></i> Artilheiro</div><div class="v">${esc(c.artilheiro.nome)} <small>${esc(c.artilheiro.pais)} · ${c.artilheiro.gols} gols</small></div></div>
        <div class="ch-cell"><div class="k"><i class="fa-solid fa-star"></i> Melhor jogador</div><div class="v">${esc(c.melhorJogador)}</div></div>
        <div class="ch-cell"><div class="k"><i class="fa-solid fa-chart-simple"></i> Destaque</div><div class="v" style="font-size:14px">${esc(c.outrasEstatisticas)}</div></div>
      </div>
    </div>`;
  }

  function ratingsHTML(r){
    const items=[
      {k:"Nível de emoção",v:r.emocao,icon:"fa-fire"},
      {k:"Importância histórica",v:r.importanciaHistorica,icon:"fa-landmark"},
      {k:"Qualidade técnica",v:r.qualidadeTecnica,icon:"fa-wand-magic-sparkles"},
      {k:"Reviravolta / Drama",v:r.drama,icon:"fa-bolt"},
    ];
    return `<div class="ratings">`+items.map(it=>`
      <div class="rating-item">
        <div class="rtop">
          <span class="rlabel"><i class="fa-solid ${it.icon}"></i>${it.k}</span>
          <span class="rval">${it.v}<small>/10</small></span>
        </div>
        <div class="bar"><span class="fill" data-w="${it.v*10}"></span></div>
      </div>`).join('')+`</div>`;
  }

  function relatedHTML(slugs){
    const cards=slugs.map(s=>gameData.find(x=>x.slug===s)).filter(Boolean).slice(0,3);
    if(!cards.length) return '';
    return `<div class="related-grid">`+cards.map(g=>{
      const cat=CAT_LABEL[g.categoria]||g.competicao;
      return `<div class="rel-card" data-slug="${g.slug}">
        <div class="rel-top">
          <span style="position:absolute;inset:0"><span style="position:absolute;top:0;bottom:0;left:0;width:58%;background:linear-gradient(135deg,${g.timeA.cor},${shade(g.timeA.cor,-18)});transform:skewX(-11deg) translateX(-10%)"></span><span style="position:absolute;top:0;bottom:0;right:0;width:58%;background:linear-gradient(225deg,${g.timeB.cor},${shade(g.timeB.cor,-18)});transform:skewX(-11deg) translateX(10%)"></span></span>
          <span class="rgrain"></span>
          <span class="rel-score">${g.timeA.placar}<span class="x">×</span>${g.timeB.placar}</span>
        </div>
        <div class="rel-body">
          <div class="rel-comp">${cat}</div>
          <div class="rel-title">${esc(g.timeA.nome)} × ${esc(g.timeB.nome)}</div>
          <div class="rel-meta">${g.fase} · ${g.ano}</div>
        </div>
      </div>`;
    }).join('')+`</div>`;
  }

  function sectionHead(icon,title,sub){
    return `<div class="sec-head"><span class="ic"><i class="fa-solid ${icon}"></i></span><div><h2>${title}</h2>${sub?`<div class="sub">${sub}</div>`:''}</div></div>`;
  }

  /* ---- HERO ---- */
  function heroHTML(g){
    const a=g.timeA,b=g.timeB;
    const cat=CAT_LABEL[g.categoria]||g.competicao;
    return `<div class="match-hero">
      <div class="hero-bg">
        <span style="position:absolute;top:0;bottom:0;left:0;width:62%;background:linear-gradient(135deg,${a.cor},${shade(a.cor,-25)})"></span>
        <span style="position:absolute;top:0;bottom:0;right:0;width:62%;background:linear-gradient(225deg,${b.cor},${shade(b.cor,-25)})"></span>
        <span class="veil"></span>
      </div>
      <div class="hero-inner wrap">
        <div class="hero-chips">
          <span class="hchip cat">${cat}</span>
          <span class="hchip lvl-${g.nivel}">${LVL_ICON[g.nivel]||''} ${g.nivel}</span>
          <span class="hchip cat">${esc(g.fase)}</span>
        </div>
        <div class="scoreboard">
          <div class="team-side">
            <div class="crest" style="background:linear-gradient(135deg,${a.cor},${shade(a.cor,-20)});color:${contrast(a.cor)}">${initials(a.nome)}</div>
            <div class="tname">${esc(a.nome)}</div>
          </div>
          <div class="score-center">
            <div class="score-nums score-hideable"><span class="n">${a.placar}</span><span class="x">×</span><span class="n">${b.placar}</span></div>
            <span class="ft-label">Resultado final</span>
            <div class="reveal-hint"><i class="fa-solid fa-eye"></i> Passe o mouse para ver o placar</div>
          </div>
          <div class="team-side">
            <div class="crest" style="background:linear-gradient(135deg,${b.cor},${shade(b.cor,-20)});color:${contrast(b.cor)}">${initials(b.nome)}</div>
            <div class="tname">${esc(b.nome)}</div>
          </div>
        </div>
        <div class="hero-meta">
          <span><i class="fa-solid fa-trophy"></i>${esc(g.competicao)} · ${esc(g.edicao)}</span>
          <span><i class="fa-solid fa-location-dot"></i>${esc(g.estadio)}</span>
          <span><i class="fa-solid fa-city"></i>${esc(g.cidade)}, ${esc(g.pais)}</span>
          <span><i class="fa-regular fa-calendar"></i>${esc(g.data)}</span>
        </div>
      </div>
    </div>`;
  }

  /* ---- VIDEO ---- */
  function videoHTML(g){
    const inner = g.youtubeId
      ? `<iframe src="https://www.youtube.com/embed/${g.youtubeId}" title="Assista à partida completa" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>`
      : `<div class="video-fallback">
           <div class="pic"><i class="fa-brands fa-youtube"></i></div>
           <h3>Vídeo indisponível na curadoria</h3>
           <p>Ainda não selecionamos um vídeo oficial verificado para esta partida. Busque nos canais oficiais (FIFA, CONMEBOL, UEFA, CBF).</p>
           <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(g.timeA.nome+' '+g.timeB.nome+' '+g.ano+' '+g.competicao)}" target="_blank" rel="noopener"><i class="fa-brands fa-youtube"></i> Procurar no YouTube</a>
         </div>`;
    return `<div class="video-wrap">${inner}</div>`;
  }

  /* ---- FICHA ---- */
  function fichaHTML(g){
    const rows=[
      ["fa-regular fa-calendar","Data", g.data],
      ["fa-solid fa-location-dot","Estádio", g.estadio],
      ["fa-solid fa-users","Público", g.publico? g.publico.toLocaleString('pt-BR')+" pessoas":"—"],
      ["fa-solid fa-user-tie","Árbitro", g.arbitro||"—"],
      ["fa-solid fa-sitemap","Fase", g.fase],
      ["fa-solid fa-trophy","Competição", g.competicao],
      ["fa-solid fa-globe","Local", g.cidade+", "+g.pais],
    ];
    return `<aside class="ficha">
      <div class="ficha-title"><i class="fa-solid fa-circle-info"></i> Ficha técnica</div>
      <dl>${rows.map(r=>`<div class="row"><dt><i class="${r[0]}"></i>${r[1]}</dt><dd>${esc(r[2])}</dd></div>`).join('')}</dl>
    </aside>`;
  }

  /* ---- EDITORIAL (parágrafos) ---- */
  function editorialHTML(txt){
    const paras=txt.split(/\n{2,}|\n/).map(s=>s.trim()).filter(Boolean);
    return `<div class="editorial">${paras.map(p=>`<p>${esc(p)}</p>`).join('')}</div>`;
  }

  /* ================= RENDER ================= */
  function renderError(){
    document.getElementById('app').innerHTML=`
      <div class="errpage wrap">
        <div class="big">🧭</div>
        <h1>Partida não encontrada</h1>
        <p>O jogo que você procura não está na nossa curadoria ou o link está incorreto. Que tal voltar e explorar os 100 clássicos?</p>
        <a href="catalogo.html"><i class="fa-solid fa-arrow-left"></i> Ver todos os jogos</a>
      </div>`;
    document.getElementById('shareBtn').style.display='none';
  }

  function render(g){
    document.title = g.titulo + " — Clássicos do Futebol";
    const app=document.getElementById('app');
    app.innerHTML =
      heroHTML(g) +
      `<section class="block"><div class="wrap">
          ${sectionHead('fa-play','Assista à partida completa','Vídeo incorporado do YouTube · canais oficiais')}
          <div class="split-2">
            <div>${videoHTML(g)}</div>
            ${fichaHTML(g)}
          </div>
       </div></section>` +

      `<section class="block"><div class="wrap">
          ${sectionHead('fa-people-group','Escalações','Formação, titulares, reservas e comando técnico')}
          <div class="lineups">
            ${lineupCard(g.timeA, g.escalacaoA, 'Mandante / Time A')}
            ${lineupCard(g.timeB, g.escalacaoB, 'Time B')}
          </div>
       </div></section>` +

      `<section class="block"><div class="wrap">
          ${sectionHead('fa-stopwatch','Lances e gols','Linha do tempo da partida')}
          ${timelineHTML(g.gols, g)}
       </div></section>` +

      `<section class="block"><div class="wrap">
          ${sectionHead('fa-book-open','A história completa da partida', g.tempoLeitura+' de leitura')}
          ${editorialHTML(g.historiaCompleta)}
       </div></section>` +

      `<section class="block"><div class="wrap">
          ${sectionHead('fa-trophy','O campeão daquele torneio','Quem levantou a taça e os destaques da edição')}
          ${championHTML(g.campeao, g)}
       </div></section>` +

      `<section class="block"><div class="wrap">
          ${sectionHead('fa-lightbulb','Curiosidades e recordes','Fatos que tornam este jogo único')}
          <div class="curio-list">${g.curiosidades.map(c=>`<div class="curio"><span class="qi"><i class="fa-solid fa-star"></i></span><p>${esc(c)}</p></div>`).join('')}</div>
       </div></section>` +

      `<section class="block"><div class="wrap">
          ${sectionHead('fa-medal','Jogadores que fizeram história','Os protagonistas desta partida')}
          <div class="players-grid">${g.jogadoresDestaque.map(p=>playerCard(p,g)).join('')}</div>
       </div></section>` +

      `<section class="block"><div class="wrap">
          ${sectionHead('fa-chart-column','Avaliação da curadoria','Nossa leitura editorial da partida')}
          ${ratingsHTML(g.avaliacaoCuradoria)}
       </div></section>` +

      (relatedHTML(g.relacionados) ?
      `<section class="block"><div class="wrap">
          ${sectionHead('fa-layer-group','Partidas relacionadas','Outros clássicos que você vai gostar')}
          ${relatedHTML(g.relacionados)}
       </div></section>` : '') +

      `<footer class="site"><div class="footer-inner">
          <p class="footer-note"><i class="fa-solid fa-circle-info" style="color:var(--accent);margin-right:6px"></i>Projeto editorial de curadoria. Vídeos incorporados do YouTube pertencem aos seus canais e detentores de direitos. Escalações e estatísticas têm caráter informativo e podem conter aproximações históricas.</p>
          <div class="footer-bottom">© 2026 Clássicos do Futebol · <a href="catalogo.html" style="color:var(--accent)">Voltar ao catálogo</a></div>
       </div></footer>`;

    // navegação nos relacionados
    app.querySelectorAll('.rel-card').forEach(c=>{
      c.addEventListener('click',()=>{ window.location.href='partida.html?id='+encodeURIComponent(c.dataset.slug); });
    });

    // animar barras de avaliação ao entrar na viewport
    const bars=app.querySelectorAll('.bar .fill');
    const obs=new IntersectionObserver((ents,o)=>{
      ents.forEach(e=>{ if(e.isIntersecting){ e.target.style.width=e.target.dataset.w+'%'; o.unobserve(e.target);} });
    },{threshold:.4});
    bars.forEach(b=>obs.observe(b));

    // animar entrada da timeline
    const tls=app.querySelectorAll('.tl-item');
    const obs2=new IntersectionObserver((ents,o)=>{
      ents.forEach((e,i)=>{ if(e.isIntersecting){ e.target.animate([{opacity:0,transform:'translateX(-10px)'},{opacity:1,transform:'none'}],{duration:400,easing:'ease',fill:'both'}); o.unobserve(e.target);} });
    },{threshold:.2});
    tls.forEach(t=>obs2.observe(t));
  }

  /* ---- SHARE ---- */
  function setupShare(g){
    const btn=document.getElementById('shareBtn');
    const toast=document.getElementById('toast');
    btn.addEventListener('click', async ()=>{
      const url=window.location.href;
      const title=g? g.titulo : 'Clássicos do Futebol';
      try{
        if(navigator.share){ await navigator.share({title, url}); return; }
      }catch(e){/* usuário cancelou — segue p/ clipboard */}
      try{
        await navigator.clipboard.writeText(url);
      }catch(e){
        // fallback antigo
        const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
      }
      btn.classList.add('done');
      btn.innerHTML='<i class="fa-solid fa-check"></i> Copiado';
      toast.classList.add('show');
      setTimeout(()=>{ toast.classList.remove('show'); btn.classList.remove('done'); btn.innerHTML='<i class="fa-solid fa-share-nodes"></i> Compartilhar'; },2200);
    });
  }

  /* ---- INIT ---- */
  function getId(){
    const p=new URLSearchParams(window.location.search);
    return p.get('id');
  }

  /* --- preferência de placar (cookie compartilhado com o catálogo) --- */
  function getCookie(name){var m=document.cookie.match(new RegExp('(?:^|; )'+name+'=([^;]*)'));return m?decodeURIComponent(m[1]):null;}
  function applyScorePref(){ if(getCookie('cf_placar')==='off'){ document.body.classList.add('scores-hidden'); } }

  /* --- playlist Top 10 (mesma ordem do catálogo) --- */
  var TOP10_SLUGS=["uruguai-brasil-1950","brasil-italia-1970","argentina-franca-2022","liverpool-ac-milan-2005","argentina-inglaterra-1986","brasil-alemanha-2014","barcelona-psg-2017","manchester-united-bayern-1999","italia-brasil-1982","brasil-suecia-1958"];
  function setupPlaylist(currentSlug){
    var p=new URLSearchParams(window.location.search);
    if(p.get('playlist')!=='top10') return;
    // achar posição atual na playlist (por slug); se não estiver, usa índice i
    var idx=TOP10_SLUGS.indexOf(currentSlug);
    if(idx<0){ idx=parseInt(p.get('i')||'0',10)||0; }
    var pos=idx+1, total=TOP10_SLUGS.length;
    // próximo jogo que exista no catálogo
    var nextSlug=null, nextIdx=idx;
    for(var k=idx+1;k<total;k++){ if(gameData.find(g=>g.slug===TOP10_SLUGS[k])){ nextSlug=TOP10_SLUGS[k]; nextIdx=k; break; } }
    var bar=document.createElement('div');
    bar.className='playlist-bar';
    bar.innerHTML='<div class="playlist-bar-inner">'
      +'<div class="pb-info"><span class="pb-tag"><i class="fa-solid fa-clapperboard"></i> Playlist</span>'
      +'<span class="pb-txt">Top 10 da história <span>· '+pos+' de '+total+'</span></span></div>'
      +'<div class="pb-actions">'
      +(nextSlug?('<a class="pb-btn next" href="partida.html?id='+encodeURIComponent(nextSlug)+'&playlist=top10&i='+nextIdx+'">Próximo <i class="fa-solid fa-forward-step"></i></a>'):'<span class="pb-btn exit" style="cursor:default">Fim da playlist</span>')
      +'<a class="pb-btn exit" href="catalogo.html#playlistRail">Sair</a>'
      +'</div></div>';
    // inserir logo abaixo da topbar
    var topbar=document.querySelector('.topbar');
    if(topbar && topbar.parentNode){ topbar.parentNode.insertBefore(bar, topbar.nextSibling); }
  }

  function init(){
    const id=getId();
    const g = id ? gameData.find(x=> x.slug===id || x.id===id) : null;
    applyScorePref();
    if(!g){ renderError(); setupShare(null); return; }
    render(g);
    setupShare(g);
    setupPlaylist(g.slug);
    window.scrollTo(0,0);
  }
  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
