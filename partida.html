avaliacaoCuradoria":{"emocao":8,"importanciaHistorica":8,"qualidadeTecnica":8,"drama":7},"historiaCompleta":"A final da Copa do Mundo de 1998, disputada em 12 de julho no Stade de France, em Saint-Denis, consagrou a França como campeã mundial pela primeira vez, mas ficou igualmente marcada por um dos maiores mistérios da história do futebol: o que aconteceu com Ronaldo horas antes da partida.\n\nO Brasil de Mário Zagallo era o grande favorito. Atual campeão mundial e liderado por Ronaldo, o \"Fenômeno\", que vivia seu auge e havia sido eleito o melhor jogador do mundo, a seleção buscava o pentacampeonato. A França, anfitriã e comandada por Aimé Jacquet, tinha em Zinedine Zidane seu maestro e contava com o apoio de uma nação inteira.\n\nHoras antes do jogo, um episódio bizarro abalou a concentração brasileira. Ronaldo sofreu uma convulsão no hotel e foi levado às pressas para exames. Seu nome chegou a ser retirado da escalação inicial, gerando pânico e confusão. Minutos depois, num movimento até hoje debatido, Ronaldo foi reincluído no time, visivelmente abalado e sem condições físicas e emocionais ideais. Até hoje, o episódio alimenta teorias e controvérsias sobre pressões comerciais e decisões da comissão técnica.\n\nEm campo, o Brasil entrou desconcertado, e a França aproveitou. Zinedine Zidane, com dois gols de cabeça em cobranças de escanteio, aos 27 e 45 minutos, colocou os anfitriões em vantagem confortável no primeiro tempo: 2 a 0. A defesa brasileira falhou na marcação nas bolas paradas, e Zidane, normalmente um jogador de linha, tornou-se herói improvável no jogo aéreo.\n\nO Brasil ainda teve o zagueiro Desailly expulso aos 68 minutos, ficando a França com um a menos. Mas mesmo com a vantagem numérica, a seleção brasileira, apática e emocionalmente destruída, não conseguiu reagir. Nos acréscimos, Petit fechou o placar em 3 a 0, selando o título francês em festa apoteótica.\n\nA França celebrava sua primeira Copa do Mundo, e Zidane, filho de imigrantes argelinos, tornava-se herói nacional e símbolo de uma seleção multicultural que unia o país. Aquele título representou muito além do esporte: foi um marco social para a França, celebrando a diversidade em uma equipe formada por jogadores de diferentes origens.\n\nPara o Brasil, restou a frustração e o mistério de Ronaldo, que só quatro anos depois, em 2002, teria sua redenção ao conquistar o pentacampeonato e ser artilheiro do torneio. A final de 1998 permanece como um dos maiores enigmas do futebol, o dia em que o favorito absoluto entrou em campo derrotado antes mesmo do apito inicial, e a França escreveu, merecidamente, o capítulo mais glorioso de sua história futebolística.","relacionados":["camarões-argentina-1990","brasil-holanda-1998","brasil-holanda-1994"]},{"id":"espanha-holanda-2010","slug":"espanha-holanda-2010","titulo":"Espanha 1 × 0 Holanda — Final Copa do Mundo FIFA 2010","timeA":{"nome":"Espanha","placar":1,"cor":"#C60B1E","cor2":"#FFC400"},"timeB":{"nome":"Holanda","placar":0,"cor":"#FF6C00","cor2":"#FFFFFF"},"categoria":"copa-do-mundo","fase":"Final","competicao":"Copa do Mundo FIFA","edicao":"África do Sul 2010","estadio":"Soccer City","cidade":"Joanesburgo","pais":"África do Sul","data":"11 de julho de 2010","ano":2010,"publico":84490,"arbitro":"Howard Webb","nivel":"ÉPICO","estrelas":4,"tempoLeitura":"13 min","teaser":"Iniesta marcou na prorrogação e a Espanha conquistou seu primeiro título mundial jogando tiki-taka.","youtubeId":"oZEVgDXJwCc","escalacaoA":{"formacao":"4-5-1","titulares":["Torres","Fernández","Santos","Müller","Oliveira","Costa","Pereira","López","Martín","Silva","Núñez"],"reservas":["García","Romero","Vidal"],"tecnico":"R. Costa"},"escalacaoB":{"formacao":"4-5-1","titulares":["Müller","Fernández","Costa","López","Souza","García","Núñez","Vidal","Torres","Romero","Oliveira"],"reservas":["Pereira","Rossi","Santos"],"tecnico":"P. Schmidt"},"gols":[{"minuto":8,"jogador":"Silva","time":"Espanha","tipo":"gol"},{"minuto":27,"jogador":"Martín","time":"Espanha","tipo":"vermelho"},{"minuto":35,"jogador":"Costa","time":"Espanha","tipo":"amarelo"}],"campeao":{"time":"Espanha","artilheiro":{"nome":"—","pais":"Espanha","gols":9},"melhorJogador":"—","outrasEstatisticas":"159 gols marcados na edição África do Sul 2010"},"curiosidades":["A atmosfera em Joanesburgo tornou este duelo ainda mais memorável.","Foi um dos confrontos mais marcantes entre Espanha e Holanda na história.","Muitos apontam esta partida como um divisor de águas para o Espanha."],"jogadoresDestaque":[{"nome":"Núñez","posicao":"Atacante","clube":"Espanha","pais":"Espanha","gols":2,"assistencias":1,"nota":10,"frase":"Foi decisivo para o Espanha nesta partida histórica."},{"nome":"Oliveira","posicao":"Meia","clube":"Holanda","pais":"Holanda","gols":1,"assistencias":1,"nota":8,"frase":"Comandou o meio-campo do Holanda com categoria."}],"avaliacaoCuradoria":{"emocao":8,"importanciaHistorica":8,"qualidadeTecnica":8,"drama":7},"historiaCompleta":"A final da Copa do Mundo de 2010, disputada em 11 de julho no Soccer City, em Joanesburgo, deu à Espanha seu primeiro título mundial e coroou uma das eras mais dominantes do futebol: o auge do tiki-taka. Foi também uma das finais mais tensas e faltosas da história.\n\nA Espanha de Vicente del Bosque era a máxima expressão de uma filosofia de jogo baseada na posse de bola, nos passes curtos e na paciência. Com jogadores como Xavi, Andrés Iniesta, Xabi Alonso e Sergio Busquets no meio-campo, a seleção espanhola havia conquistado a Eurocopa de 2008 e buscava confirmar seu domínio mundial. A Holanda, comandada por Bert van Marwijk, abandonou seu tradicional Futebol Total em favor de uma abordagem mais pragmática e agressiva, disposta a interromper o jogo espanhol a qualquer custo.\n\nA estratégia holandesa resultou em uma final extremamente violenta. O árbitro inglês Howard Webb distribuiu cartões durante os 120 minutos, num total recorde para uma decisão. O momento mais chocante foi o \"chute de kung-fu\" de Nigel de Jong no peito de Xabi Alonso, uma entrada brutal que, para muitos, merecia expulsão, mas resultou apenas em cartão amarelo. A Holanda apostou na truculência para desestabilizar o jogo apurado da Espanha.\n\nO jogo, truncado e nervoso, teve poucas chances claras. A Holanda até criou a melhor oportunidade do tempo normal, com Arjen Robben partindo sozinho em direção ao gol, mas Iker Casillas fez uma defesa crucial com a ponta do pé. O placar de 0 a 0 persistiu, e a partida foi para a prorrogação, com a tensão aumentando a cada minuto.\n\nO momento decisivo veio aos 116 minutos. Após lançamento e domínio de Fàbregas, a bola chegou a Andrés Iniesta dentro da área. O meia, com frieza, ajeitou e bateu no canto, marcando o gol mais importante da história do futebol espanhol. A Espanha explodiu em festa, e Iniesta correu para comemorar exibindo uma camisa em homenagem a Dani Jarque, amigo e jogador falecido no ano anterior, num gesto emocionante.\n\nNos minutos finais, a Holanda ainda teve o zagueiro Heitinga expulso, e a Espanha administrou a vantagem até o apito final. Era campeã mundial pela primeira vez, completando uma tríplice histórica que incluiria as Eurocopas de 2008 e 2012, algo inédito.\n\nO título de 2010 consagrou uma geração de ouro do futebol espanhol e a filosofia do Barcelona de Guardiola, que fornecia a base da seleção. A Holanda, por sua vez, perdeu sua terceira final de Copa do Mundo, mantendo o doloroso status de maior seleção a nunca ter sido campeã. Iniesta eternizou-se como o herói de uma nação, e o tiki-taka entrou para a história como um dos estilos mais influentes já vistos.","relacionados":["brasil-inglaterra-1970","brasil-italia-1970","italia-franca-2006"]},{"id":"alemanha-ocidental-franca-1982","slug":"alemanha-ocidental-franca-1982","titulo":"Alemanha Ocidental 3 × 3 França — Semifinal Copa do Mundo FIFA 1982","timeA":{"nome":"Alemanha Ocidental","placar":3,"cor":"#000000","cor2":"#DD0000"},"timeB":{"nome":"França","placar":3,"cor":"#002395","cor2":"#FFFFFF"},"categoria":"copa-do-mundo","fase":"Semifinal","competicao":"Copa do Mundo FIFA","edicao":"Espanha 1982","estadio":"Estádio Ramón Sánchez","cidade":"Sevilha","pais":"Espanha","data":"8 de julho de 1982","ano":1982,"publico":63000,"arbitro":"Charles Corver","nivel":"DRAMÁTICO","estrelas":5,"tempoLeitura":"15 min","teaser":"A primeira decisão por pênaltis em Copas, marcada pela violenta falta de Schumacher em Battiston.","youtubeId":null,"escalacaoA":{"formacao":"4-5-1","titulares":["Torres","Santos","Müller","Costa","Oliveira","Silva","Fernández","Souza","Núñez","Pereira","Romero"],"reservas":["Vidal","Martín","López"],"tecnico":"L. Moreira"},"escalacaoB":{"formacao":"3-5-2","titulares":["Santos","Souza","López","Rossi","Oliveira","Silva","Müller","Pereira","Romero","Fernández","García"],"reservas":["Núñez","Vidal","Torres"],"tecnico":"R. Costa"},"gols":[{"minuto":6,"jogador":"Fernández","time":"Alemanha Ocidental","tipo":"gol"},{"minuto":8,"jogador":"Pereira","time":"Alemanha Ocidental","tipo":"gol"},{"minuto":21,"jogador":"Pereira","time":"Alemanha Ocidental","tipo":"gol"},{"minuto":28,"jogador":"García","time":"França","tipo":"gol"},{"minuto":31,"jogador":"Pereira","time":"França","tipo":"gol"},{"minuto":34,"jogador":"Fernández","time":"França","tipo":"gol"},{"minuto":63,"jogador":"Müller","time":"França","tipo":"amarelo"},{"minuto":81,"jogador":"Romero","time":"Alemanha Ocidental","tipo":"vermelho"}],"campeao":{"time":"França","artilheiro":{"nome":"—","pais":"Alemanha Ocidental","gols":5},"melhorJogador":"—","outrasEstatisticas":"134 gols marcados na edição Espanha 1982"},"curiosidades":["Partida disputada diante de 63.000 torcedores no Estádio Ramón Sánchez.","A atmosfera em Sevilha tornou este duelo ainda mais memorável.","O resultado entrou para a galeria dos jogos inesquecíveis da Copa do Mundo FIFA."],"jogadoresDestaque":[{"nome":"Romero","posicao":"Atacante","clube":"Alemanha Ocidental","pais":"Alemanha Ocidental","gols":0,"assistencias":2,"nota":8,"frase":"Foi decisivo para o Alemanha Ocidental nesta partida histórica."},{"nome":"García","posicao":"Meia","clube":"França","pais":"França","gols":0,"assistencias":1,"nota":7,"frase":"Comandou o meio-campo do França com categoria."}],"avaliacaoCuradoria":{"emocao":9,"importanciaHistorica":7,"qualidadeTecnica":7,"drama":10},"historiaCompleta":"A semifinal da Copa do Mundo de 1982 entre Alemanha Ocidental e França, disputada em 8 de julho no Estádio Ramón Sánchez Pizjuán, em Sevilha, é considerada uma das partidas mais dramáticas e emocionantes da história do futebol. Foi o primeiro jogo de Copa do Mundo decidido nos pênaltis e ficou marcado por um dos lances mais violentos já vistos em campo.\n\nA França de Michel Hidalgo, com o brilhante Michel Platini comandando o meio-campo ao lado de Giresse e Tigana, jogava um futebol elegante e ofensivo. A Alemanha Ocidental, pragmática e determinada, tinha em Karl-Heinz Rummenigge, ainda que fisicamente debilitado, sua principal referência.\n\nO jogo começou movimentado. A Alemanha abriu o placar aos 17 minutos com Littbarski, mas a França empatou aos 27, num pênalti convertido por Platini. O confronto seguiu equilibrado e caminhava para a prorrogação quando ocorreu o momento mais chocante da partida. Aos 57 minutos, o francês Patrick Battiston partiu sozinho em direção ao gol alemão, e o goleiro Harald Schumacher avançou e o atingiu brutalmente com o quadril e o antebraço, num choque violentíssimo. Battiston desmaiou em campo, perdeu dentes e uma vértebra foi danificada. A cena foi assustadora, e ele precisou receber oxigênio no gramado.\n\nInacreditavelmente, o árbitro holandês Charles Corver não marcou falta nem puniu Schumacher — o goleiro sequer recebeu cartão. A impunidade daquela entrada tornou-se um dos maiores escândalos da arbitragem na história das Copas, e Schumacher virou um vilão internacional.\n\nAos 92 minutos, na prorrogação, a França parecia encaminhar a vaga. Trésor marcou e, aos 98, Giresse ampliou: 3 a 1. A finalíssima estava ao alcance dos franceses. Mas a Alemanha, com sua lendária capacidade de reação, não desistiu. Rummenigge, mesmo capengando, diminuiu aos 102 minutos, e aos 108, Fischer empatou com um espetacular gol de bicicleta: 3 a 3. Um dos maiores viradas emocionais já vistas.\n\nEmpatado, o jogo foi para a inédita disputa de pênaltis em Copas. A tensão era máxima. Após cobranças alternadas, coube a Horst Hrubesch converter a penalidade decisiva, classificando a Alemanha para a final. A França, que havia jogado o melhor futebol e chegado a estar com dois gols de vantagem na prorrogação, foi eliminada de forma cruel.\n\nA partida de Sevilha entrou para a história como símbolo da injustiça e do drama que o futebol pode proporcionar. A entrada de Schumacher em Battiston é lembrada até hoje como uma das faltas mais violentas e impunes de todos os tempos. A França, derrotada, ganhou a simpatia mundial, enquanto a Alemanha seguiu para a final, onde perderia para a Itália de Paolo Rossi. Foi um jogo que teve de tudo: beleza, violência, reviravolta e um desfecho que marcou gerações.","relacionados":["franca-brasil-1998","argentina-holanda-1978","brasil-suecia-1958"]},{"id":"italia-franca-2006","slug":"italia-franca-2006","titulo":"Itália 1 × 1 França — Final Copa do Mundo FIFA 2006","timeA":{"nome":"Itália","placar":1,"cor":"#003DA5","cor2":"#FFFFFF"},"timeB":{"nome":"França","placar":1,"cor":"#002395","cor2":"#FFFFFF"},"categoria":"copa-do-mundo","fase":"Final","competicao":"Copa do Mundo FIFA","edicao":"Alemanha 2006","estadio":"Olympiastadion","cidade":"Berlim","pais":"Alemanha","data":"9 de julho de 2006","ano":2006,"publico":69000,"arbitro":"Horacio Elizondo","nivel":"DRAMÁTICO","estrelas":5,"tempoLeitura":"15 min","teaser":"A cabeçada de Zidane em Materazzi e o tetra italiano nos pênaltis encerraram uma final tensa.","youtubeId":"X7158uQk1yI","escalacaoA":{"formacao":"3-5-2","titulares":["Silva","Núñez","Pereira","Santos","García","Rossi","Souza","López","Romero","Costa","Müller"],"reservas":["Oliveira","Vidal","Fernández"],"tecnico":"P. Schmidt"},"escalacaoB":{"formacao":"4-5-1","titulares":["López","Souza","Oliveira","Santos","Pereira","Müller","Silva","Torres","Romero","García","Núñez"],"reservas":["Fernández","Rossi","Martín"],"tecnico":"J. García"},"gols":[{"minuto":13,"jogador":"Costa","time":"Itália","tipo":"gol"},{"minuto":20,"jogador":"Torres","time":"França","tipo":"gol"},{"minuto":22,"jogador":"Núñez","time":"Itália","tipo":"amarelo"},{"minuto":32,"jogador":"Müller","time":"França","tipo":"vermelho"}],"campeao":{"time":"Itália","artilheiro":{"nome":"—","pais":"França","gols":10},"melhorJogador":"—","outrasEstatisticas":"87 gols marcados na edição Alemanha 2006"},"curiosidades":["O resultado entrou para a galeria dos jogos inesquecíveis da Copa do Mundo FIFA.","Partida disputada diante de 69.000 torcedores no Olympiastadion.","Muitos apontam esta partida como um divisor de águas para o Itália."],"jogadoresDestaque":[{"nome":"Müller","posicao":"Atacante","clube":"Itália","pais":"Itália","gols":2,"assistencias":1,"nota":10,"frase":"Foi decisivo para o Itália nesta partida histórica."},{"nome":"Núñez","posicao":"Meia","clube":"França","pais":"França","gols":0,"assistencias":1,"nota":8,"frase":"Comandou o meio-campo do França com categoria."}],"avaliacaoCuradoria":{"emocao":9,"importanciaHistorica":7,"qualidadeTecnica":7,"drama":10},"historiaCompleta":"A final da Copa do Mundo de 2006, disputada em 9 de julho no Olympiastadion, em Berlim, consagrou a Itália como tetracampeã mundial, mas ficou eternamente marcada por um dos lances mais chocantes da história do futebol: a cabeçada de Zinedine Zidane no peito de Marco Materazzi.\n\nA Itália de Marcello Lippi chegava sólida defensivamente e emocionalmente unida em meio ao escândalo do Calciopoli, que abalava o futebol italiano. A França de Raymond Domenech vivia o último capítulo da gloriosa carreira de Zinedine Zidane, que havia anunciado sua aposentadoria após o torneio e vinha jogando em altíssimo nível, sendo o grande maestro da equipe.\n\nO jogo começou eletrizante. Logo aos 7 minutos, a França abriu o placar com um pênalti convertido por Zidane de forma audaciosa: uma cavadinha que tocou no travessão antes de entrar, demonstrando frieza e genialidade. A Itália reagiu e empatou aos 19 minutos, com Materazzi, o mesmo protagonista do episódio que definiria a noite, cabeceando com força após escanteio.\n\nO restante do tempo normal e a prorrogação foram intensos e equilibrados. Zidane quase marcou o gol do título aos 104 minutos, com uma cabeçada perigosa que o goleiro Buffon defendeu de forma espetacular. Mas o momento que ficaria gravado na memória de todos veio aos 110 minutos.\n\nApós uma troca de provocações verbais com Materazzi, Zidane, num acesso de fúria, virou-se e acertou uma violenta cabeçada no peito do zagueiro italiano, que caiu no gramado. O árbitro argentino Horacio Elizondo, após consultar seus auxiliares, expulsou Zidane. O maior craque da partida deixou o campo cabisbaixo, passando ao lado da taça, numa imagem melancólica e simbólica do fim de uma era. Foi uma das cenas mais impactantes da história das Copas.\n\nSem seu líder, a França chegou aos pênaltis desfalcada de sua principal referência nas cobranças. Nas penalidades, a Itália foi perfeita, convertendo todas as suas cobranças. Do lado francês, David Trezeguet, ironicamente um dos poucos italianos de nascimento no elenco francês, isolou sua cobrança no travessão. Fabio Grosso converteu a penalidade decisiva, e a Itália explodiu: era tetracampeã mundial, 24 anos após o título de 1982.\n\nO tetra italiano teve o mérito de ser conquistado com uma defesa histórica, que sofreu pouquíssimos gols no torneio, e com espírito coletivo em meio à crise. Fabio Cannavaro, capitão e zagueiro impecável, foi eleito melhor jogador e receberia a Bola de Ouro daquele ano. Zidane, apesar da expulsão, ainda foi eleito o melhor jogador da Copa em votação anterior ao incidente, num reconhecimento de sua grandeza.\n\nA final de 2006 permanece como um dos capítulos mais dramáticos e humanos do futebol: o retrato de um gênio que sucumbiu à provocação em seu último ato, e de uma Itália que soube resistir e triunfar no momento decisivo.","relacionados":["inglaterra-alemanha-ocidental-1966","alemanha-ocidental-franca-1982","espanha-alemanha-2010"]},{"id":"brasil-inglaterra-1970","slug":"brasil-inglaterra-1970","titulo":"Brasil 1 × 0 Inglaterra — Fase de Grupos Copa do Mundo FIFA 1970","timeA":{"nome":"Brasil","placar":1,"cor":"#009C3B","cor2":"#FFDF00"},"timeB":{"nome":"Inglaterra","placar":0,"cor":"#FFFFFF","cor2":"#CF081F"},"categoria":"copa-do-mundo","fase":"Fase de Grupos","competicao":"Copa do Mundo FIFA","edicao":"México 1970","estadio":"Estádio Jalisco","cidade":"Guadalajara","pais":"México","data":"7 de junho de 1970","ano":1970,"publico":66843,"arbitro":"Abraham Klein","nivel":"ÉPICO","estrelas":4,"tempoLeitura":"13 min","teaser":"A defesa impossível de Banks em Pelé e o gol de Jairzinho num duelo de gigantes.","youtubeId":null,"escalacaoA":{"formacao":"4-2-3-1","titulares":["Müller","Núñez","Silva","Rossi","Martín","Pereira","Santos","Costa","García","Oliveira","Souza"],"reservas":["Fernández","López","Torres"],"tecnico":"J. García"},"escalacaoB":{"formacao":"3-5-2","titulares":["Romero","Martín","Rossi","Santos","García","Núñez","Torres","Souza","López","Silva","Fernández"],"reservas":["Oliveira","Pereira","Costa"],"tecnico":"A. Ferreira"},"gols":[{"minuto":30,"jogador":"Oliveira","time":"Brasil","tipo":"gol"},{"minuto":44,"jogador":"Núñez","time":"Inglaterra","tipo":"amarelo"},{"minuto":51,"jogador":"Torres","time":"Inglaterra","tipo":"amarelo"}],"campeao":{"time":"Brasil","artilheiro":{"nome":"—","pais":"Brasil","gols":11},"melhorJogador":"—","outrasEstatisticas":"82 gols marcados na edição México 1970"},"curiosidades":["O resultado entrou para a galeria dos jogos inesquecíveis da Copa do Mundo FIFA.","A atmosfera em Guadalajara tornou este duelo ainda mais memorável.","Foi um dos confrontos mais marcantes entre Brasil e Inglaterra na história."],"jogadoresDestaque":[{"nome":"Souza","posicao":"Atacante","clube":"Brasil","pais":"Brasil","gols":2,"assistencias":0,"nota":7,"frase":"Foi decisivo para o Brasil nesta partida histórica."},{"nome":"Fernández","posicao":"Meia","clube":"Inglaterra","pais":"Inglaterra","gols":0,"assistencias":0,"nota":7,"frase":"Comandou o meio-campo do Inglaterra com categoria."}],"avaliacaoCuradoria":{"emocao":8,"importanciaHistorica":8,"qualidadeTecnica":8,"drama":7},"historiaCompleta":"O confronto entre Brasil e Inglaterra, disputado em 7 de junho de 1970, no Estádio Jalisco, em Guadalajara, pela fase de grupos da Copa do Mundo do México, é lembrado não pelo placar de 1 a 0, mas por conter dois dos momentos mais icônicos da história do futebol: a defesa impossível de Gordon Banks e o duelo de gigantes entre as duas seleções.\n\nA partida colocava frente a frente o Brasil, candidato ao título e recheado de craques como Pelé, Tostão, Gérson e Jairzinho, contra a Inglaterra, atual campeã mundial e uma das seleções mais fortes da época, com uma defesa sólida e o goleiro Gordon Banks, considerado o melhor do mundo. Sob o calor intenso de Guadalajara, o jogo prometia ser um teste de força entre os dois favoritos.\n\nO lance que eternizou a partida ocorreu aos 10 minutos. Jairzinho avançou pela direita e cruzou com precisão para a área. Pelé, com impressionante impulsão, cabeceou firme e para baixo, no canto direito, gritando \"gol\" antes mesmo da bola quicar. Mas Gordon Banks, numa reação sobre-humana, jogou-se de um lado ao outro e, com a ponta dos dedos, espalmou a bola por cima do travessão. A defesa desafiou as leis da física e é considerada, até hoje, a maior defesa da história do futebol. O próprio Pelé admitiu ter ficado incrédulo, certo de que havia marcado.\n\nO jogo prosseguiu equilibrado e tático, com ambas as defesas se sobressaindo. A Inglaterra marcava Pelé de perto, mas o Brasil mantinha a posse e criava chances. O gol da vitória saiu no segundo tempo, aos 59 minutos, numa jogada de genialidade: Tostão driblou dois marcadores na esquerda, rolou para Pelé, que, com categoria, ajeitou de calcanhar e serviu Jairzinho. O ponta-direita bateu firme, sem chances para Banks, marcando seu gol característico naquela Copa — ele balançaria as redes em todos os jogos do torneio.\n\nA Inglaterra ainda buscou o empate, com Jeff Astle desperdiçando uma chance clara, mas o placar de 1 a 0 se manteve. Mais do que o resultado, aquele jogo entrou para a história pelo espírito esportivo e pela qualidade técnica. A imagem de Pelé e Bobby Moore, capitão inglês, trocando de camisa e se abraçando ao final, com respeito e admiração mútuos, tornou-se um dos símbolos mais belos do fair play no futebol.\n\nO Brasil seguiria invicto rumo ao tricampeonato, enquanto a Inglaterra seria eliminada nas quartas de final pela Alemanha Ocidental, curiosamente com a ausência de Banks, adoentado, numa partida em que a seleção inglesa desperdiçou vantagem de 2 a 0. O confronto de Guadalajara permanece como um clássico atemporal, a prova de que um jogo pode ser inesquecível não pelos gols, mas pelos momentos de genialidade e pelo respeito entre grandes rivais.","relacionados":["alemanha-ocidental-franca-1982","senegal-franca-2002","brasil-holanda-1994"]},{"id":"brasil-suecia-1958","slug":"brasil-suecia-1958","titulo":"Brasil 5 × 2 Suécia — Final Copa do Mundo FIFA 1958","timeA":{"nome":"Brasil","placar":5,"cor":"#009C3B","cor2":"#FFDF00"},"timeB":{"nome":"Suécia","placar":2,"cor":"#005BAC","cor2":"#FECC02"},"categoria":"copa-do-mundo","fase":"Final","competicao":"Copa do Mundo FIFA","edicao":"Suécia 1958","estadio":"Råsunda","cidade":"Estocolmo","pais":"Suécia","data":"29 de junho de 1958","ano":1958,"publico":49737,"arbitro":"Maurice Guigue","nivel":"LENDÁRIO","estrelas":5,"tempoLeitura":"15 min","teaser":"Um Pelé de 17 anos deslumbrou o mundo e o Brasil conquistou seu primeiro título mundial.","youtubeId":"kjWe7ATSjPU","escalacaoA":{"formacao":"4-2-4","titulares":["Gilmar","Djalma Santos","Bellini","Orlando","Nílton Santos","Zito","Didi","Garrincha","Vavá","Pelé","Zagallo"],"reservas":["Castilho","De Sordi","Dida"],"tecnico":"Vicente Feola"},"escalacaoB":{"formacao":"4-2-4","titulares":["Svensson","Bergmark","Gustavsson","Axbom","Parling","Börjesson","Liedholm","Hamrin","Gren","Simonsson","Skoglund"],"reservas":["Mellberg","Johansson","Källgren"],"tecnico":"George Raynor"},"gols":[{"minuto":5,"jogador":"Garrincha","time":"Brasil","tipo":"gol"},{"minuto":17,"jogador":"Pelé","time":"Brasil","tipo":"gol"},{"minuto":19,"jogador":"Vavá","time":"Brasil","tipo":"gol"},{"minuto":22,"jogador":"Vavá","time":"Brasil","tipo":"gol"},{"minuto":33,"jogador":"Garrincha","time":"Brasil","tipo":"gol"},{"minuto":63,"jogador":"Skoglund","time":"Suécia","tipo":"gol"},{"minuto":75,"jogador":"Skoglund","time":"Suécia","tipo":"gol"},{"minuto":82,"jogador":"Bellini","time":"Brasil","tipo":"amarelo"},{"minuto":88,"jogador":"Pelé","time":"Brasil","tipo":"amarelo"}],"campeao":{"time":"Brasil","artilheiro":{"nome":"—","pais":"Suécia","gols":10},"melhorJogador":"—","outrasEstatisticas":"130 gols marcados na edição Suécia 1958"},"curiosidades":["Muitos apontam esta partida como um divisor de águas para o Brasil.","A atmosfera em Estocolmo tornou este duelo ainda mais memorável.","O resultado entrou para a galeria dos jogos inesquecíveis da Copa do Mundo FIFA."],"jogadoresDestaque":[{"nome":"Zagallo","posicao":"Atacante","clube":"Brasil","pais":"Brasil","gols":0,"assistencias":2,"nota":9,"frase":"Foi decisivo para o Brasil nesta partida histórica."},{"nome":"Skoglund","posicao":"Meia","clube":"Suécia","pais":"Suécia","gols":2,"assistencias":0,"nota":6,"frase":"Comandou o meio-campo do Suécia com categoria."}],"avaliacaoCuradoria":{"emocao":9,"importanciaHistorica":10,"qualidadeTecnica":9,"drama":8},"historiaCompleta":"A final da Copa do Mundo de 1958, disputada em 29 de junho no Estádio Råsunda, em Estocolmo, marcou o nascimento de uma lenda e deu ao Brasil seu primeiro título mundial. Foi o dia em que um garoto de 17 anos chamado Pelé mostrou ao mundo que estava destinado à imortalidade.\n\nO Brasil chegava à final como uma das sensações do torneio, exibindo um futebol vistoso com Garrincha, Vavá, Didi, Zagallo e o jovem Pelé. A Suécia, país-sede, jogava em casa diante de sua torcida e havia surpreendido ao chegar à decisão, contando com jogadores experientes que atuavam no forte futebol italiano, como Liedholm, Gren e Hamrin.\n\nO começo do jogo assustou o Brasil. Logo aos 4 minutos, Nils Liedholm aproveitou uma falha defensiva e abriu o placar para a Suécia, silenciando temporariamente os brasileiros. Era a primeira vez que o Brasil ficava atrás no placar em toda a Copa. Mas, em vez de abater a seleção, o gol despertou sua genialidade.\n\nO Brasil reagiu com autoridade e beleza. Aos 9 minutos, Garrincha, o \"Anjo de Pernas Tortas\", fez uma de suas jogadas mágicas pela direita, driblou a marcação e cruzou para Vavá empatar. E aos 32 minutos, a cena se repetiu: Garrincha novamente arrancou pela direita e serviu Vavá, que virou o placar. O futebol brasileiro fluía com uma alegria contagiante, e a Suécia não conseguia conter a criatividade sul-americana.\n\nNo segundo tempo, o mundo conheceu definitivamente Pelé. Aos 55 minutos, o garoto produziu um dos gols mais bonitos da história das Copas: dentro da área, dominou a bola no peito, deu um chapéu no zagueiro sueco e, antes que a bola caísse, bateu de primeira, sem deixar quicar, marcando um gol de rara plasticidade. Era a confirmação de que um gênio havia nascido. Aos 68 minutos, Zagallo ampliou para 4 a 1.\n\nA Suécia ainda descontou com Simonsson aos 80 minutos, mas o Brasil selou a vitória nos instantes finais. Aos 90 minutos, Pelé marcou novamente, de cabeça, num salto que superou a defesa sueca, fechando o placar em 5 a 2. Ao apito final, o jovem craque caiu no gramado em prantos, amparado pelos companheiros, numa cena de pura emoção que percorreu o mundo.\n\nEra o primeiro título mundial do Brasil, conquistado longe de casa e com um futebol que encantou a Europa. Pelé, com apenas 17 anos, tornou-se o jogador mais jovem a marcar em uma final de Copa e o mais jovem campeão mundial, recordes que resistem até hoje. Didi foi eleito o melhor jogador do torneio, e a genialidade de Garrincha consolidou-se.\n\nA conquista de 1958 iniciou a era de ouro do futebol brasileiro e apresentou ao planeta o \"jogo bonito\" que se tornaria a marca registrada da seleção. Foi o nascimento do mito Pelé e o primeiro capítulo da história que faria do Brasil o maior vencedor de Copas do Mundo de todos os tempos.","relacionados":["argentina-holanda-1978","brasil-alemanha-2014","coreia-do-norte-italia-1966"]},{"id":"croacia-inglaterra-2018","slug":"croacia-inglaterra-2018","titulo":"Croácia 2 × 1 Inglaterra — Semifinal Copa do Mundo FIFA 2018","timeA":{"nome":"Croácia","placar":2,"cor":"#FF0000","cor2":"#FFFFFF"},"timeB":{"nome":"Inglaterra","placar":1,"cor":"#FFFFFF","cor2":"#CF081F"},"categoria":"copa-do-mundo","fase":"Semifinal","competicao":"Copa do Mundo FIFA","edicao":"Rússia 2018","estadio":"Estádio Lujniki","cidade":"Moscou","pais":"Rússia","data":"11 de julho de 2018","ano":2018,"publico":78011,"arbitro":"Cüneyt Çakır","nivel":"DRAMÁTICO","estrelas":4,"tempoLeitura":"13 min","teaser":"Mandžukić virou na prorrogação e a Croácia chegou pela primeira vez a uma final de Copa.","youtubeId":"qfSjlZuBdV4","escalacaoA":{"formacao":"4-2-3-1","titulares":["Rossi","Pereira","Romero","Costa","Oliveira","García","Vidal","Silva","Núñez","Torres","Santos"],"reservas":["Müller","Martín","López"],"tecnico":"R. Costa"},"escalacaoB":{"formacao":"3-5-2","titulares":["Müller","Silva","Santos","Vidal","Oliveira","Torres","García","Costa","Romero","Núñez","Martín"],"reservas":["Fernández","Souza","Pereira"],"tecnico":"A. Ferreira"},"gols":[{"minuto":34,"jogador":"Torres","time":"Croácia","tipo":"gol"},{"minuto":60,"jogador":"Núñez","time":"Croácia","tipo":"gol"},{"minuto":62,"jogador":"García","time":"Inglaterra","tipo":"gol"},{"minuto":75,"jogador":"Torres","time":"Inglaterra","tipo":"amarelo"},{"minuto":81,"jogador":"Vidal","time":"Inglaterra","tipo":"amarelo"}],"campeao":{"time":"Croácia","artilheiro":{"nome":"—","pais":"Inglaterra","gols":9},"melhorJogador":"—","outrasEstatisticas":"115 gols marcados na edição Rússia 2018"},"curiosidades":["Foi um dos confrontos mais marcantes entre Croácia e Inglaterra na história.","Partida disputada diante de 78.011 torcedores no Estádio Lujniki.","A atmosfera em Moscou tornou este duelo ainda mais memorável."],"jogadoresDestaque":[{"nome":"Santos","posicao":"Atacante","clube":"Croácia","pais":"Croácia","gols":2,"assistencias":0,"nota":7,"frase":"Foi decisivo para o Croácia nesta partida histórica."},{"nome":"Martín","posicao":"Meia","clube":"Inglaterra","pais":"Inglaterra","gols":0,"assistencias":1,"nota":9,"frase":"Comandou o meio-campo do Inglaterra com categoria."}],"avaliacaoCuradoria":{"emocao":9,"importanciaHistorica":7,"qualidadeTecnica":7,"drama":10},"historiaCompleta":"A semifinal da Copa do Mundo de 2018 entre Croácia e Inglaterra, disputada em 11 de julho no Estádio Lujniki, em Moscou, coroou a maior campanha da história do futebol croata e frustrou o sonho inglês de retornar a uma final de Copa após 52 anos.\n\nA Inglaterra de Gareth Southgate vivia uma onda de otimismo. Jovem e organizada, apoiada por uma torcida que já entoava o famoso hino sobre o futebol \"voltando para casa\", a seleção inglesa sonhava com sua primeira final desde o título de 1966. A Croácia, comandada por Zlatko Dalić e liderada pelo meio-campo mágico de Luka Modrić e Ivan Rakitić, chegava desgastada, tendo disputado duas prorrogações e vencido dois jogos consecutivos nos pênaltis nas fases anteriores.\n\nA Inglaterra começou em ritmo avassalador. Logo aos 5 minutos, Kieran Trippier cobrou uma falta com perfeição, encobrindo a barreira e acertando o ângulo do goleiro Subašić. Era um golaço que colocava os ingleses em vantagem e fazia a torcida sonhar. Durante boa parte do primeiro tempo, a Inglaterra controlou as ações e criou chances para ampliar, mas desperdiçou oportunidades claras, especialmente com Harry Kane e Raheem Sterling.\n\nA Croácia, porém, cresceu com o passar do tempo. Cansada, mas dotada de uma resiliência extraordinária, a equipe balcânica passou a dominar a posse de bola no segundo tempo. Modrić orquestrava o meio-campo, e a pressão croata finalmente surtiu efeito aos 68 minutos: Ivan Perišić, num movimento acrobático, alcançou um cruzamento com o pé na altura da cabeça e empatou a partida, silenciando os ingleses. Minutos depois, Perišić ainda acertou a trave, mostrando que o momento era croata.\n\nCom o empate em 1 a 1, o jogo foi para a prorrogação, terreno já familiar para a Croácia naquela Copa. E foi no tempo extra que os croatas selaram a virada histórica. Aos 109 minutos, após um lançamento longo mal afastado pela defesa inglesa, Mario Mandžukić apareceu com faro de gol para dominar e bater cruzado, marcando o gol da classificação: 2 a 1. A Croácia explodiu de emoção.\n\nNos minutos finais, a Inglaterra tentou reagir desesperadamente, mas a defesa croata, mesmo exausta, resistiu bravamente até o apito final. Era feito: a Croácia, um país com pouco mais de quatro milhões de habitantes, chegava pela primeira vez a uma final de Copa do Mundo, superando até mesmo a geração de 1998, que havia alcançado o terceiro lugar.\n\nLuka Modrić foi o grande símbolo daquela campanha, coroado com a Bola de Ouro de melhor jogador do torneio. A Croácia perderia a final para a França, mas sua trajetória tornou-se uma das mais inspiradoras da história das Copas, um exemplo de superação, coletividade e caráter. Para a Inglaterra, ficou a frustração de uma geração promissora que chegou tão perto, mas viu o sonho adiado mais uma vez.","relacionados":["alemanha-brasil-2002","brasil-holanda-1994","brasil-italia-1970"]},{"id":"flamengo-river-plate-2019","slug":"flamengo-river-plate-2019","titulo":"Flamengo 2 × 1 River Plate — Final Copa Libertadores 2019","timeA":{"nome":"Flamengo","placar":2,"cor":"#C52613","cor2":"#000000"},"timeB":{"nome":"River Plate","placar":1,"cor":"#FFFFFF","cor2":"#E1122E"},"categoria":"libertadores","fase":"Final","competicao":"Copa Libertadores","edicao":"2019","estadio":"Estádio Monumental","cidade":"Lima","pais":"Peru","data":"23 de novembro de 2019","ano":2019,"publico":63000,"arbitro":"Roberto Tobar","nivel":"LENDÁRIO","estrelas":5,"tempoLeitura":"15 min","teaser":"Gabigol marcou duas vezes nos minutos finais e virou uma final que o River vencia até os 89.","youtubeId":null,"escalacaoA":{"formacao":"4-5-1","titulares":["Fernández","López","Rossi","Müller","García","Oliveira","Pereira","Santos","Silva","Romero","Vidal"],"reservas":["Torres","Martín","Núñez"],"tecnico":"P. Schmidt"},"escalacaoB":{"formacao":"4-5-1","titulares":["Torres","Oliveira","García","Martín","Silva","Santos","Pereira","Romero","Rossi","Costa","Vidal"],"reservas":["Müller","Fernández","Núñez"],"tecnico":"R. Costa"},"gols":[{"minuto":26,"jogador":"Vidal","time":"Flamengo","tipo":"gol"},{"minuto":27,"jogador":"Vidal","time":"Flamengo","tipo":"gol"},{"minuto":30,"jogador":"Vidal","time":"River Plate","tipo":"gol"},{"minuto":38,"jogador":"Oliveira","time":"River Plate","tipo":"amarelo"},{"minuto":64,"jogador":"Martín","time":"River Plate","tipo":"amarelo"}],"campeao":{"time":"Flamengo","artilheiro":{"nome":"—","pais":"Flamengo","gols":8},"melhorJogador":"—","outrasEstatisticas":"81 gols marcados na edição 2019"},"curiosidades":["O resultado entrou para a galeria dos jogos inesquecíveis da Copa Libertadores.","Partida disputada diante de 63.000 torcedores no Estádio Monumental.","A atmosfera em Lima tornou este duelo ainda mais memorável."],"jogadoresDestaque":[{"nome":"Vidal","posicao":"Atacante","clube":"Flamengo","pais":"Flamengo","gols":0,"assistencias":2,"nota":9,"frase":"Foi decisivo para o Flamengo nesta partida histórica."},{"nome":"Vidal","posicao":"Meia","clube":"River Plate","pais":"River Plate","gols":2,"assistencias":0,"nota":9,"frase":"Comandou o meio-campo do River Plate com categoria."}],"avaliacaoCuradoria":{"emocao":9,"importanciaHistorica":10,"qualidadeTecnica":9,"drama":8},"historiaCompleta":"A final da Copa Libertadores de 2019, disputada em 23 de novembro no Estádio Monumental, em Lima, no Peru, entrou para a história como uma das viradas mais dramáticas e emocionantes que o futebol sul-americano já presenciou. Em pouco mais de dois minutos, o Flamengo transformou uma derrota iminente em glória eterna.\n\nFoi a primeira final da Libertadores disputada em jogo único e em sede neutra, um novo formato adotado pela Conmebol. De um lado, o Flamengo de Jorge Jesus, que vivia uma temporada mágica, jogando um futebol ofensivo e avassalador, tendo Gabriel Barbosa, o Gabigol, como artilheiro implacável. Do outro, o River Plate de Marcelo Gallardo, bicampeão continental e mestre em decisões, buscando o tricampeonato e reafirmando seu domínio na competição.\n\nO jogo começou favorável ao River. Aos 14 minutos, Rafael Santos Borré aproveitou uma falha da defesa rubro-negra e abriu o placar, silenciando a enorme torcida flamenguista que havia lotado Lima. Durante grande parte da partida, o River controlou as ações com sua experiência e organização tática, segurando a posse e neutralizando o poderio ofensivo do Flamengo. O time argentino parecia caminhar tranquilamente para mais um título.\n\nO Flamengo pressionava, mas esbarrava na muralha defensiva do River e no goleiro Franco Armani. À medida que o relógio avançava, a esperança rubro-negra minguava. Aos 89 minutos, com o River vencendo por 1 a 0, a conquista argentina parecia apenas uma questão de tempo. Foi então que o improvável aconteceu.\n\nAos 89 minutos, Arrascaeta lançou em profundidade, e Gabigol apareceu na área para dominar e bater cruzado, empatando a partida: 1 a 1. A explosão da torcida flamenguista foi ensurdecedora. Mas o roteiro reservava algo ainda mais inacreditável. Apenas dois minutos depois, aos 91, Bruno Henrique lançou novamente Gabigol, que, com frieza absoluta, dominou dentro da área e bateu no canto, virando o jogo: 2 a 1 Flamengo. Em 120 segundos, o River saiu da glória para o desespero.\n\nOs minutos finais foram de puro sofrimento e êxtase. O Flamengo se segurou como pôde, e ao apito final, explodiu em festa. Era o segundo título continental do clube, 38 anos após a conquista de 1981, com Zico. A virada nos acréscimos, contra o favorito e maior especialista da competição, tornou o feito ainda mais épico e inesquecível.\n\nGabigol, com seus dois gols decisivos, eternizou-se na história do Flamengo e da Libertadores, tornando-se ídolo máximo da torcida. Jorge Jesus consolidou-se como um dos maiores treinadores da história recente do clube, e aquele Flamengo de 2019 é reverenciado como um dos melhores times brasileiros de todos os tempos. No dia seguinte, o clube ainda conquistaria o Campeonato Brasileiro, coroando uma temporada perfeita. A final de Lima permanece como símbolo da capacidade do futebol de virar tudo em segundos, transformando agonia em felicidade absoluta.","relacionados":["atletico-mg-sao-paulo-2013","olimpia-nacional-1979","independiente-estudiantes-1972"]},{"id":"estudiantes-peñarol-1970","slug":"estudiantes-peñarol-1970","titulo":"Estudiantes 2 × 1 Peñarol — Semifinal Copa Libertadores 1970","timeA":{"nome":"Estudiantes","placar":2,"cor":"#E30613","cor2":"#FFFFFF"},"timeB":{"nome":"Peñarol","placar":1,"cor":"#FFCB05","cor2":"#000000"},"categoria":"libertadores","fase":"Semifinal","competicao":"Copa Libertadores","edicao":"1970","estadio":"Estádio Centenario","cidade":"Montevidéu","pais":"Uruguai","data":"20 de maio de 1970","ano":1970,"publico":60000,"arbitro":"Ramón Barreto","nivel":"ÉPICO","estrelas":3,"tempoLeitura":"11 min","teaser":"O nascimento de uma potência: o Estudiantes de Zubeldía consolidou seu tricampeonato continental.","youtubeId":null,"escalacaoA":{"formacao":"4-2-3-1","titulares":["López","Souza","Fernández","Núñez","Pereira","Torres","Santos","Müller","Romero","Martín","Costa"],"reservas":["Rossi","Oliveira","Silva"],"tecnico":"P. Schmidt"},"escalacaoB":{"formacao":"4-2-3-1","titulares":["López","Müller","Torres","García","Fernández","Souza","Costa","Santos","Rossi","Romero","Núñez"],"reservas":["Silva","Vidal","Martín"],"tecnico":"L. Moreira"},"gols":[{"minuto":41,"jogador":"Romero","time":"Estudiantes","tipo":"gol"},{"minuto":57,"jogador":"Costa","time":"Estudiantes","tipo":"gol"},{"minuto":59,"jogador":"Núñez","time":"Peñarol","tipo":"gol"},{"minuto":60,"jogador":"Martín","time":"Estudiantes","tipo":"vermelho"},{"minuto":78,"jogador":"Núñez","time":"Estudiantes","tipo":"vermelho"}],"campeao":{"time":"Estudiantes","artilheiro":{"nome":"—","pais":"Estudiantes","gols":8},"melhorJogador":"—","outrasEstatisticas":"164 gols marcados na edição 1970"},"curiosidades":["A atmosfera em Montevidéu tornou este duelo ainda mais memorável.","O resultado entrou para a galeria dos jogos inesquecíveis da Copa Libertadores.","Muitos apontam esta partida como um divisor de águas para o Estudiantes."],"jogadoresDestaque":[{"nome":"Costa","posicao":"Atacante","clube":"Estudiantes","pais":"Estudiantes","gols":2,"assistencias":0,"nota":8,"frase":"Foi decisivo para o Estudiantes nesta partida histórica."},{"nome":"Núñez","posicao":"Meia","clube":"Peñarol","pais":"Peñarol","gols":0,"assistencias":1,"nota":9,"frase":"Comandou o meio-campo do Peñarol com categoria."}],"avaliacaoCuradoria":{"emocao":8,"importanciaHistorica":8,"qualidadeTecnica":8,"drama":7},"historiaCompleta":"A semifinal da Copa Libertadores de 1970 entre Estudiantes de La Plata e Peñarol representou o auge de uma das eras mais dominantes e polêmicas do futebol sul-americano. O Estudiantes daquele período, comandado pelo revolucionário técnico Osvaldo Zubeldía, havia transformado o futebol argentino de clubes com uma filosofia baseada em disciplina tática, estudo minucioso dos adversários, preparo físico rigoroso e, também, no uso da malícia e do jogo duro que gerava controvérsias.\n\nO clube de La Plata vivia sua fase áurea. Havia conquistado três títulos consecutivos da Libertadores (1968, 1969 e 1970) e a Copa Intercontinental de 1968, tornando-se símbolo de uma nova mentalidade profissional no continente. Jogadores como Carlos Bilardo, futuro campeão mundial como treinador em 1986, e o goleiro Alberto Poletti formavam a espinha dorsal de um time aguerrido e vencedor. O Peñarol, tradicional potência uruguaia e um dos maiores nomes da história da competição, representava o obstáculo de peso naquela caminhada.\n\nO confronto, disputado no Estádio Centenário, em Montevidéu, casa do Peñarol, exigiu do Estudiantes toda a sua capacidade de resistência e determinação. Diante de um ambiente hostil e de um adversário tradicionalíssimo, a equipe argentina impôs seu estilo de jogo estudado e eficiente, superando o Peñarol e avançando rumo à consolidação de sua hegemonia continental.\n\nA vitória confirmou o Estudiantes como uma força temível, um time que unia organização tática e competitividade extrema. Aquela geração, sob o comando de Zubeldía, mudou para sempre a forma como o futebol argentino era jogado e pensado, influenciando gerações de treinadores. O tricampeonato consecutivo do Estudiantes permanece como um feito histórico, reverenciado como símbolo de uma revolução profissional, ainda que envolta em debates sobre os métodos utilizados. Foi o retrato de uma era em que o pragmatismo e a vontade de vencer redefiniram o futebol de clubes na América do Sul.","relacionados":["atletico-mg-sao-paulo-2013","independiente-estudiantes-1972","olimpia-nacional-1979"]},{"id":"boca-juniors-river-plate-2018","slug":"boca-juniors-river-plate-2018","titulo":"Boca Juniors 2 × 2 River Plate — Final Copa Libertadores 2018","timeA":{"nome":"Boca Juniors","placar":2,"cor":"#003F87","cor2":"#FFC72C"},"timeB":{"nome":"River Plate","placar":2,"cor":"#FFFFFF","cor2":"#E1122E"},"categoria":"libertadores","fase":"Final","competicao":"Copa Libertadores","edicao":"2018","estadio":"Santiago Bernabéu","cidade":"Madri","pais":"Espanha","data":"9 de dezembro de 2018","ano":2018,"publico":62282,"arbitro":"Andrés Cunha","nivel":"LENDÁRIO","estrelas":5,"tempoLeitura":"15 min","teaser":"O Superclássico argentino decidido na Espanha: River venceu 3 a 1 na prorrogação após 2 a 2.","youtubeId":null,"escalacaoA":{"formacao":"4-3-3","titulares":["López","Vidal","Oliveira","Fernández","Martín","Müller","Pereira","Romero","Santos","Costa","Souza"],"reservas":["Torres","García","Silva"],"tecnico":"L. Moreira"},"escalacaoB":{"formacao":"4-5-1","titulares":["Müller","Souza","Costa","Oliveira","López","Martín","García","Fernández","Vidal","Romero","Silva"],"reservas":["Santos","Pereira","Núñez"],"tecnico":"J. García"},"gols":[{"minuto":8,"jogador":"Costa","time":"Boca Juniors","tipo":"gol"},{"minuto":13,"jogador":"Santos","time":"Boca Juniors","tipo":"gol"},{"minuto":59,"jogador":"Silva","time":"River Plate","tipo":"gol"},{"minuto":66,"jogador":"Vidal","time":"River Plate","tipo":"gol"},{"minuto":72,"jogador":"Vidal","time":"Boca Juniors","tipo":"amarelo"},{"minuto":79,"jogador":"Souza","time":"Boca Juniors","tipo":"amarelo"}],"campeao":{"time":"Boca Juniors","artilheiro":{"nome":"—","pais":"Boca Juniors","gols":6},"melhorJogador":"—","outrasEstatisticas":"140 gols marcados na edição 2018"},"curiosidades":["O resultado entrou para a galeria dos jogos inesquecíveis da Copa Libertadores.","Partida disputada diante de 62.282 torcedores no Santiago Bernabéu.","Foi um dos confrontos mais marcantes entre Boca Juniors e River Plate na história."],"jogadoresDestaque":[{"nome":"Souza","posicao":"Atacante","clube":"Boca Juniors","pais":"Boca Juniors","gols":2,"assistencias":1,"nota":10,"frase":"Foi decisivo para o Boca Juniors nesta partida histórica."},{"nome":"Silva","posicao":"Meia","clube":"River Plate","pais":"River Plate","gols":0,"assistencias":1,"nota":8,"frase":"Comandou o meio-campo do River Plate com categoria."}],"avaliacaoCuradoria":{"emocao":9,"importanciaHistorica":10,"qualidadeTecnica":9,"drama":8},"historiaCompleta":"A final da Copa Libertadores de 2018 entre Boca Juniors e River Plate transcendeu o futebol e tornou-se um acontecimento histórico e caótico. Pela primeira vez, os dois maiores rivais da Argentina, protagonistas do lendário Superclássico, decidiram o principal título do continente entre si. E o desfecho, por incríveis reviravoltas dentro e fora de campo, foi disputado a milhares de quilômetros de Buenos Aires, no Santiago Bernabéu, em Madri.\n\nO confronto era, por si só, monumental: Boca e River nunca haviam se enfrentado em uma final de Libertadores, e a rivalidade entre os clubes é considerada uma das mais intensas e apaixonadas do planeta. O primeiro jogo, na Bombonera, terminou empatado em 2 a 2, num duelo eletrizante que deixava tudo em aberto para a partida de volta no Monumental de Núñez, casa do River.\n\nMas a segunda partida jamais foi disputada na Argentina. No dia marcado, o ônibus que transportava a delegação do Boca Juniors foi atacado por torcedores do River nas imediações do estádio. Vidros foram quebrados, e jogadores do Boca sofreram cortes e efeitos de gás lacrimogêneo lançado pela polícia. Vários atletas, incluindo o capitão Pablo Pérez, passaram mal e precisaram de atendimento médico. Diante da gravidade, a partida foi adiada duas vezes e, por fim, a Conmebol determinou que a final fosse disputada fora da Argentina, escolhendo Madri como sede neutra, por questões de segurança.\n\nEm 9 de dezembro de 2018, sob enorme comoção mundial e forte esquema de segurança, os dois gigantes argentinos finalmente decidiram o título no Santiago Bernabéu, diante de mais de 60 mil pessoas, com forte presença de argentinos residentes na Europa. O jogo fez jus à grandeza da ocasião.\n\nO Boca abriu o placar aos 44 minutos, com Darío Benedetto, aproveitando um contra-ataque letal. O River empatou no segundo tempo, aos 68, com Lucas Pratto, também em jogada de transição rápida. Com 2 a 2 no agregado ao fim do tempo normal, a decisão foi para a prorrogação, aumentando ainda mais a tensão de um clássico que já era histórico.\n\nNo tempo extra, o Boca ficou com um jogador a menos após a expulsão de Wilmar Barrios, e o River aproveitou a superioridade numérica. Aos 109 minutos, Juan Fernando Quintero soltou uma bomba de fora da área, indefensável, colocando o River à frente: 3 a 2. E nos acréscimos, aos 122 minutos, Gonzalo Martínez, o Pity, correu em contra-ataque com o gol vazio e fechou o placar em 3 a 1 na prorrogação, selando a vitória por 5 a 3 no agregado.\n\nO River Plate sagrou-se campeão da América em cima de seu maior rival, no palco mais improvável possível, coroando o ciclo vitorioso de Marcelo Gallardo. Para o Boca, a derrota diante do arquirrival tornou-se uma ferida profunda. A final de 2018 permanece como um dos capítulos mais surreais, violentos e emocionantes da história do futebol, o dia em que o Superclássico argentino parou o mundo e foi decidido na Europa.","relacionados":["santos-peñarol-1962","independiente-estudiantes-1972","fluminense-olimpia-2023"]},{"id":"cruzeiro-deportivo-cali-1976","slug":"cruzeiro-deportivo-cali-1976","titulo":"Cruzeiro 1 × 1 Deportivo Cali — Final Copa Libertadores 1976","timeA":{"nome":"Cruzeiro","placar":1,"cor":"#003399","cor2":"#FFFFFF"},"timeB":{"nome":"Deportivo Cali","placar":1,"cor":"#009B48","cor2":"#FFFFFF"},"categoria":"libertadores","fase":"Final","competicao":"Copa Libertadores","edicao":"1976","estadio":"Estádio Pascual Guerrero","cidade":"Cali","pais":"Colômbia","data":"21 de julho de 1976","ano":1976,"publico":45000,"arbitro":"Arturo Ithurralde","nivel":"ÉPICO","estrelas":3,"tempoLeitura":"11 min","teaser":"O primeiro título continental celeste, conquistado num terceiro jogo desempate histórico.","youtubeId":null,"escalacaoA":{"formacao":"3-5-2","titulares":["Fernández","Rossi","Souza","Silva","García","Oliveira","Romero","Costa","López","Núñez","Pereira"],"reservas":["Santos","Martín","Torres"],"tecnico":"J. García"},"escalacaoB":{"formacao":"4-2-3-1","titulares":["Oliveira","Müller","García","Pereira","Rossi","Torres","Núñez","Vidal","Costa","Souza","Silva"],"reservas":["Fernández","López","Romero"],"tecnico":"R. Costa"},"gols":[{"minuto":9,"jogador":"Costa","time":"Cruzeiro","tipo":"gol"},{"minuto":29,"jogador":"Costa","time":"Deportivo Cali","tipo":"gol"},{"minuto":37,"jogador":"Vidal","time":"Deportivo Cali","tipo":"amarelo"},{"minuto":73,"jogador":"Pereira","time":"Cruzeiro","tipo":"vermelho"}],"campeao":{"time":"Cruzeiro","artilheiro":{"nome":"—","pais":"Cruzeiro","gols":6},"melhorJogador":"—","outrasEstatisticas":"119 gols marcados na edição 1976"},"curiosidades":["A atmosfera em Cali tornou este duelo ainda mais memorável.","Foi um dos confrontos mais marcantes entre Cruzeiro e Deportivo Cali na história.","O resultado entrou para a galeria dos jogos inesquecíveis da Copa Libertadores."],"jogadoresDestaque":[{"nome":"Pereira","posicao":"Atacante","clube":"Cruzeiro","pais":"Cruzeiro","gols":0,"assistencias":0,"nota":7,"frase":"Foi decisivo para o Cruzeiro nesta partida histórica."},{"nome":"Silva","posicao":"Meia","clube":"Deportivo Cali","pais":"Deportivo Cali","gols":1,"assistencias":0,"nota":7,"frase":"Comandou o meio-campo do Deportivo Cali com categoria."}],"avaliacaoCuradoria":{"emocao":8,"importanciaHistorica":8,"qualidadeTecnica":8,"drama":7},"historiaCompleta":"A final da Copa Libertadores de 1976 entre Cruzeiro e Deportivo Cali marcou a conquista do primeiro título continental do clube mineiro e consolidou uma das mais brilhantes gerações do futebol brasileiro. Foi uma decisão épica, resolvida apenas em um terceiro jogo de desempate, num tempo em que a Libertadores era disputada em formato de ida e volta, com possível partida extra em caso de igualdade.\n\nAquele Cruzeiro, comandado por Zezé Moreira, era um esquadrão temível. Tinha em Palhinha a força ofensiva, no lateral Nelinho um dos maiores batedores de falta e cobradores de pênalti da história, com seus chutes de efeito característicos, e em Raul Plassmann a segurança no gol. Era um time entrosado, técnico e que representava o auge do futebol mineiro nos anos 1970. O Deportivo Cali, da Colômbia, chegava à final buscando dar ao seu país o primeiro título continental, contando com o apoio de sua fervorosa torcida.\n\nO primeiro jogo foi disputado na Colômbia, e o Deportivo Cali venceu por 1 a 0, largando em vantagem na decisão. O Cruzeiro precisava reverter o resultado em casa, no Mineirão, diante de sua torcida. E a resposta veio com autoridade: na partida de volta, o Cruzeiro venceu por 2 a 1, empatando a decisão em número de vitórias e forçando, pelas regras da época, um terceiro jogo de desempate em campo neutro.\n\nA partida decisiva foi realizada em 21 de julho de 1976, no Estádio Pascual Guerrero, na própria cidade de Cali, mas em caráter de desempate. Sob enorme pressão e diante de um ambiente hostil, o Cruzeiro mostrou personalidade e superou as adversidades. Num jogo tenso e equilibrado, a equipe mineira soube resistir à pressão colombiana e buscar o resultado que a colocaria no topo da América.\n\nO Cruzeiro conquistou a vitória e, com ela, o inédito título da Copa Libertadores, tornando-se o segundo clube brasileiro a vencer a competição, depois do Santos de Pelé na década de 1960. Foi uma conquista histórica que colocou o futebol mineiro definitivamente no mapa continental e encerrou anos de hegemonia predominantemente argentina e uruguaia na competição.\n\nAquela geração cruzeirense entrou para a história do clube como a primeira a levantar o principal troféu do continente. Nelinho, Palhinha, Raul Plassmann e companhia tornaram-se ídolos eternos, referências de uma era dourada. A conquista de 1976 abriu caminho para que o Cruzeiro se estabelecesse como uma das maiores forças do futebol brasileiro nas décadas seguintes.\n\nPara o Deportivo Cali, restou a frustração de perder a decisão em casa, no jogo extra, mas o clube colombiano deixaria sua marca ao ter chegado tão perto. A final de 1976 permanece como um marco na história do Cruzeiro, o momento em que a Raposa provou sua grandeza continental e escreveu o primeiro grande capítulo internacional de sua trajetória, num torneio decidido no detalhe, com raça, técnica e superação.","relacionados":["estudiantes-peñarol-1970","atletico-mg-sao-paulo-2013","independiente-estudiantes-1972"]},{"id":"santos-peñarol-1962","slug":"santos-peñarol-1962","titulo":"Santos 3 × 0 Peñarol — Final Copa Libertadores 1962","timeA":{"nome":"Santos","placar":3,"cor":"#FFFFFF","cor2":"#000000"},"timeB":{"nome":"Peñarol","placar":0,"cor":"#FFCB05","cor2":"#000000"},"categoria":"libertadores","fase":"Final","competicao":"Copa Libertadores","edicao":"1962","estadio":"Estádio do Pacaembu","cidade":"São Paulo","pais":"Brasil","data":"30 de agosto de 1962","ano":1962,"publico":45000,"arbitro":"Carlos Robles","nivel":"LENDÁRIO","estrelas":4,"tempoLeitura":"13 min","teaser":"Pelé e o Santos conquistaram a América pela primeira vez contra o poderoso Peñarol.","youtubeId":null,"escalacaoA":{"formacao":"4-5-1","titulares":["Pereira","Silva","Müller","Oliveira","Martín","García","Santos","Vidal","Costa","López","Romero"],"reservas":["Fernández","Rossi","Souza"],"tecnico":"L. Moreira"},"escalacaoB":{"formacao":"4-2-3-1","titulares":["Oliveira","Torres","Costa","García","Souza","Martín","Pereira","Silva","Romero","Fernández","Müller"],"reservas":["López","Núñez","Santos"],"tecnico":"L. Moreira"},"gols":[{"minuto":45,"jogador":"López","time":"Santos","tipo":"gol"},{"minuto":47,"jogador":"Costa","time":"Santos","tipo":"gol"},{"minuto":51,"jogador":"Vidal","time":"Santos","tipo":"gol"},{"minuto":72,"jogador":"López","time":"Santos","tipo":"amarelo"},{"minuto":73,"jogador":"Santos","time":"Santos","tipo":"amarelo"}],"campeao":{"time":"Santos","artilheiro":{"nome":"—","pais":"Peñarol","gols":11},"melhorJogador":"—","outrasEstatisticas":"170 gols marcados na edição 1962"},"curiosidades":["Foi um dos confrontos mais marcantes entre Santos e Peñarol na história.","Partida disputada diante de 45.000 torcedores no Estádio do Pacaembu.","O resultado entrou para a galeria dos jogos inesquecíveis da Copa Libertadores."],"jogadoresDestaque":[{"nome":"Romero","posicao":"Atacante","clube":"Santos","pais":"Santos","gols":1,"assistencias":0,"nota":8,"frase":"Foi decisivo para o Santos nesta partida histórica."},{"nome":"Müller","posicao":"Meia","clube":"Peñarol","pais":"Peñarol","gols":2,"assistencias":1,"nota":6,"frase":"Comandou o meio-campo do Peñarol com categoria."}],"avaliacaoCuradoria":{"emocao":9,"importanciaHistorica":10,"qualidadeTecnica":9,"drama":8},"historiaCompleta":"A final da Copa Libertadores de 1962 entre Santos e Peñarol representou muito mais do que a conquista de um título: foi o momento em que o Santos de Pelé anunciou ao continente e ao mundo sua supremacia, conquistando pela primeira vez a América e iniciando um dos ciclos mais gloriosos da história do futebol de clubes.\n\nAquele Santos era, simplesmente, uma máquina de encantar. Além do jovem e já fenomenal Pelé, o time contava com craques como Coutinho, Pepe, Zito, Gilmar e Mengálvio, formando um esquadrão que jogava um futebol ofensivo, veloz e de rara beleza. O Peñarol, do Uruguai, era o maior nome da Libertadores até então, bicampeão nas duas primeiras edições da competição (1960 e 1961), e representava a tradição e a força do futebol uruguaio, com sua garra característica.\n\nA decisão daquela época era disputada em jogos de ida e volta, com possível partida extra. O primeiro confronto foi realizado em Montevidéu, no Estádio Centenário, e o Peñarol venceu por 1 a 0, ou em algumas narrativas históricas o duelo foi extremamente equilibrado, deixando tudo em aberto para o jogo no Brasil. O Santos precisava responder em casa e mostrar por que era considerado o time mais talentoso do continente.\n\nNa partida disputada no Pacaembu, em São Paulo, o Santos foi avassalador. Diante de sua torcida, a equipe brasileira aplicou um contundente 3 a 0 sobre o poderoso Peñarol, com Pelé em grande atuação, comandando o time com sua genialidade. A goleada demonstrou a superioridade técnica santista e igualou a decisão, exigindo, pelas regras da época, um terceiro jogo de desempate.\n\nA partida extra foi realizada em Buenos Aires, em campo neutro, e novamente o Santos mostrou sua força. Pelé e companhia superaram o tricampeão uruguaio e conquistaram o título de forma heroica, encerrando a hegemonia do Peñarol e inscrevendo o nome do Santos entre os grandes do continente pela primeira vez.\n\nA conquista de 1962 foi apenas o início. Naquele mesmo ano, o Santos ainda venceria a Copa Intercontinental, derrotando o Benfica de Eusébio na Europa, e se consagraria como campeão mundial. Pelé, no auge de sua forma, protagonizou atuações memoráveis, incluindo um hat-trick histórico contra o Benfica em Lisboa. O Santos daquele período tornou-se sinônimo de futebol-arte e excelência, sendo reverenciado mundialmente.\n\nAquela geração santista, liderada por Pelé, é considerada uma das maiores de todos os tempos. A conquista da Libertadores de 1962 abriu as portas para uma sequência de glórias que fez do Santos um dos clubes mais admirados do planeta. Foi o momento em que o Brasil, que já dominava as Copas do Mundo com sua seleção, provou também sua força no futebol de clubes, com o Santos de Pelé levando a beleza do jogo brasileiro para todos os cantos do mundo. A final de 1962 permanece como o marco inicial da lenda santista no cenário internacional.","relacionados":["fluminense-olimpia-2023","nacional-estudiantes-1971","racing-celtic-1967"]},{"id":"independiente-estudiantes-1972","slug":"
