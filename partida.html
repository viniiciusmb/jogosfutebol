<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partida — Clássicos do Futebol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ===================== TOKENS ===================== */
:root{
  --bg:#0A0F1E;--bg-2:#0d1424;--accent:#F5A623;--accent-2:#ffca6a;
  --text:#FFFFFF;--muted:#8B9BB4;--card:#111827;--border:#1F2D40;
  --radius:16px;--maxw:1120px;--shadow:0 20px 50px -24px rgba(0,0,0,.85);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
::selection{background:var(--accent);color:#111}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}

/* ===================== TOP BAR ===================== */
.topbar{position:sticky;top:0;z-index:60;background:rgba(10,15,30,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.topbar-inner{max-width:var(--maxw);margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.back{display:inline-flex;align-items:center;gap:9px;color:var(--muted);font-weight:700;font-size:14px;padding:8px 12px;border-radius:10px;border:1px solid transparent;transition:.18s}
.back:hover{color:var(--text);border-color:var(--border);background:var(--card);transform:translateX(-2px)}
.topbar .brandmini{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;opacity:.9}
.share-btn{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);color:var(--text);font-weight:700;font-size:13.5px;padding:9px 14px;border-radius:10px;cursor:pointer;font-family:inherit;transition:.18s}
.share-btn:hover{border-color:var(--accent);color:var(--accent)}
.share-btn.done{border-color:#3ecf8e;color:#3ecf8e}

/* ===================== HERO ===================== */
.match-hero{position:relative;overflow:hidden;padding:56px 0 44px;border-bottom:1px solid var(--border)}
.match-hero .hero-bg{position:absolute;inset:0;z-index:0;opacity:.9}
.match-hero .hero-bg::before,.match-hero .hero-bg::after{content:"";position:absolute;top:0;bottom:0;width:62%}
.match-hero .hero-bg .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,15,30,.55),rgba(10,15,30,.82) 60%,var(--bg));z-index:1}
.match-hero .hero-inner{position:relative;z-index:2;text-align:center}
.hero-chips{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
.hchip{font-size:11.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:8px;backdrop-filter:blur(6px)}
.hchip.cat{background:rgba(10,15,30,.6);border:1px solid rgba(255,255,255,.16);color:#cfe}
.lvl-LENDÁRIO{background:rgba(245,166,35,.95);color:#131313}
.lvl-ÉPICO{background:rgba(120,150,255,.95);color:#0b1020}
.lvl-DRAMÁTICO{background:rgba(255,90,95,.95);color:#1a0505}
.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:clamp(14px,4vw,54px);max-width:820px;margin:0 auto}
.team-side{display:flex;flex-direction:column;align-items:center;gap:14px}
.crest{width:clamp(70px,14vw,104px);height:clamp(70px,14vw,104px);border-radius:22px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:clamp(26px,6vw,40px);box-shadow:0 12px 30px -10px rgba(0,0,0,.7);border:2px solid rgba(255,255,255,.14)}
.team-side .tname{font-weight:900;font-size:clamp(18px,3.4vw,28px);letter-spacing:-.02em;line-height:1.05;text-align:center}
.score-center{display:flex;flex-direction:column;align-items:center;gap:6px}
.score-nums{display:flex;align-items:center;gap:clamp(8px,2.4vw,20px);font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.04em}
.score-nums .n{font-size:clamp(52px,13vw,104px);line-height:.9;text-shadow:0 6px 30px rgba(0,0,0,.6)}
.score-nums .x{font-size:clamp(22px,5vw,40px);color:var(--accent)}
/* placar ocultável (respeita preferência salva no catálogo) */
body.scores-hidden .score-hideable{filter:blur(16px);transition:filter .2s}
body.scores-hidden .score-hideable:hover{filter:blur(0)}
.score-hideable{transition:filter .2s}
.reveal-hint{display:none;text-align:center;color:var(--muted);font-size:12.5px;font-weight:600;margin-top:10px}
body.scores-hidden .reveal-hint{display:block}
.reveal-hint i{color:var(--accent)}
/* barra de playlist (assistir tudo) */
.playlist-bar{position:sticky;top:57px;z-index:55;background:linear-gradient(90deg,rgba(245,166,35,.14),rgba(10,15,30,.9));backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.playlist-bar-inner{max-width:var(--maxw);margin:0 auto;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.pb-info{display:flex;align-items:center;gap:11px;min-width:0}
.pb-tag{font-size:10.5px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#141414;background:var(--accent);padding:4px 9px;border-radius:6px;flex:0 0 auto}
.pb-txt{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-txt span{color:var(--muted);font-weight:600}
.pb-actions{display:flex;align-items:center;gap:9px;flex:0 0 auto}
.pb-btn{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:13px;padding:9px 15px;border-radius:9px;cursor:pointer;border:none;font-family:inherit;transition:.18s;text-decoration:none}
.pb-btn.next{background:var(--accent);color:#141414}
.pb-btn.next:hover{transform:translateY(-1px)}
.pb-btn.exit{background:transparent;border:1px solid var(--border-2);color:var(--muted)}
.pb-btn.exit:hover{color:var(--text);border-color:var(--accent)}
@media(max-width:560px){.pb-txt{display:none}}
.ft-label{font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);border-radius:99px;padding:4px 12px;background:rgba(10,15,30,.5)}
.hero-meta{display:flex;gap:9px 22px;justify-content:center;flex-wrap:wrap;margin-top:30px;color:#c2cee0;font-size:13.5px;font-weight:600}
.hero-meta span{display:inline-flex;align-items:center;gap:7px}
.hero-meta i{color:var(--accent);font-size:12px}
.hero-title-full{margin-top:22px;color:var(--muted);font-size:14px;font-weight:600}
@media(max-width:560px){
  .scoreboard{grid-template-columns:1fr;gap:20px}
  .score-center{order:-1}
}

/* ===================== SECTION SHELL ===================== */
section.block{padding:44px 0}
.block + .block{border-top:1px solid var(--border)}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.sec-head .ic{width:38px;height:38px;border-radius:11px;background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.28);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
.sec-head h2{font-size:clamp(20px,3vw,26px);font-weight:900;letter-spacing:-.02em}
.sec-head .sub{color:var(--muted);font-size:13.5px;font-weight:500;margin-top:1px}

/* ===================== VIDEO ===================== */
.video-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:#000;box-shadow:var(--shadow)}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.video-fallback{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;background:
  radial-gradient(600px 300px at 50% 0%, rgba(245,166,35,.12), transparent 60%), var(--bg-2)}
.video-fallback .pic{font-size:52px;color:var(--border)}
.video-fallback h3{font-size:18px;font-weight:800}
.video-fallback p{color:var(--muted);font-size:13.5px;max-width:44ch}
.video-fallback a{margin-top:6px;display:inline-flex;align-items:center;gap:8px;background:#ff0000;color:#fff;font-weight:800;font-size:13.5px;padding:10px 16px;border-radius:10px}

/* ===================== TWO-COL (video + ficha) ===================== */
.split-2{display:grid;grid-template-columns:1fr;gap:22px}
@media(min-width:900px){.split-2{grid-template-columns:1.7fr 1fr}}
.ficha{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:6px 6px 6px}
.ficha .ficha-title{padding:16px 18px 10px;font-weight:800;font-size:15px;display:flex;align-items:center;gap:9px}
.ficha .ficha-title i{color:var(--accent)}
.ficha dl{display:flex;flex-direction:column}
.ficha .row{display:flex;justify-content:space-between;gap:14px;padding:11px 18px;border-top:1px solid var(--border);font-size:13.5px}
.ficha .row dt{color:var(--muted);font-weight:600;display:flex;align-items:center;gap:8px}
.ficha .row dt i{width:15px;text-align:center;color:#6b7c98;font-size:12px}
.ficha .row dd{font-weight:700;text-align:right}

/* ===================== LINEUPS ===================== */
.lineups{display:grid;grid-template-columns:1fr;gap:22px}
@media(min-width:820px){.lineups{grid-template-columns:1fr 1fr}}
.lineup-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.lineup-head{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--border)}
.lineup-head .lh-left{display:flex;align-items:center;gap:12px}
.lineup-head .dot{width:34px;height:34px;border-radius:9px;flex:0 0 auto;border:1px solid rgba(255,255,255,.15)}
.lineup-head .team{font-weight:900;font-size:16px;letter-spacing:-.01em}
.lineup-head .form{color:var(--muted);font-size:12px;font-weight:700;margin-top:1px}
.lineup-head .formation-badge{font-size:12px;font-weight:900;color:var(--accent);border:1px solid rgba(245,166,35,.3);background:rgba(245,166,35,.08);padding:5px 10px;border-radius:8px}

/* pitch */
.pitch{position:relative;margin:14px;aspect-ratio:5/7;border-radius:12px;
  background:repeating-linear-gradient(180deg,#123a24 0 12%,#0f3320 12% 24%);
  border:1px solid #1c4a30;overflow:hidden}
.pitch .lines{position:absolute;inset:0}
.pitch .center-line{position:absolute;left:0;right:0;top:50%;height:2px;background:rgba(255,255,255,.18)}
.pitch .center-circle{position:absolute;left:50%;top:50%;width:90px;height:90px;border:2px solid rgba(255,255,255,.18);border-radius:50%;transform:translate(-50%,-50%)}
.pitch .box{position:absolute;left:50%;transform:translateX(-50%);width:56%;height:14%;border:2px solid rgba(255,255,255,.18)}
.pitch .box.top{top:0;border-top:none}
.pitch .box.bot{bottom:0;border-bottom:none}
.player{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;width:70px}
.player .num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff;border:2px solid rgba(255,255,255,.6);box-shadow:0 3px 8px rgba(0,0,0,.5)}
.player .pn{font-size:10.5px;font-weight:700;color:#eafff2;text-shadow:0 1px 3px rgba(0,0,0,.9);text-align:center;line-height:1.05;max-width:74px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bench{padding:4px 18px 18px}
.bench h4{font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800;margin:6px 0 10px;display:flex;align-items:center;gap:8px}
.bench .subs{display:flex;flex-wrap:wrap;gap:7px}
.bench .sub{font-size:12px;font-weight:600;color:#c2cee0;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:99px;padding:5px 11px}
.coach{display:flex;align-items:center;gap:9px;padding:12px 18px;border-top:1px solid var(--border);font-size:13px}
.coach i{color:var(--accent)}
.coach b{font-weight:800}
.coach span{color:var(--muted);font-weight:600}

/* ===================== TIMELINE ===================== */
.timeline{position:relative;margin-left:8px;padding-left:34px}
.timeline::before{content:"";position:absolute;left:12px;top:6px;bottom:6px;width:2px;background:linear-gradient(180deg,var(--accent),var(--border))}
.tl-item{position:relative;padding:12px 0;display:flex;align-items:flex-start;gap:14px}
.tl-item .dot{position:absolute;left:-28px;top:14px;width:26px;height:26px;border-radius:50%;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px}
.tl-item.gol .dot{border-color:var(--accent);background:rgba(245,166,35,.15)}
.tl-item.vermelho .dot{border-color:#ff5a5f;background:rgba(255,90,95,.14)}
.tl-item.amarelo .dot{border-color:#ffd23f;background:rgba(255,210,63,.12)}
.tl-min{font-weight:900;font-size:14px;min-width:44px;color:var(--accent);font-variant-numeric:tabular-nums;padding-top:2px}
.tl-body{flex:1}
.tl-player{font-weight:800;font-size:15px}
.tl-team{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:1px;display:flex;align-items:center;gap:7px}
.tl-team .tcolor{width:9px;height:9px;border-radius:2px;display:inline-block}
.tl-type{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:6px;margin-left:auto;align-self:center}
.type-gol{background:rgba(245,166,35,.15);color:var(--accent)}
.type-amarelo{background:rgba(255,210,63,.14);color:#ffd23f}
.type-vermelho{background:rgba(255,90,95,.15);color:#ff5a5f}

/* ===================== EDITORIAL ===================== */
.editorial{max-width:760px}
.editorial p{color:#cdd7e6;font-size:16px;line-height:1.85;margin-bottom:20px}
.editorial p:first-child::first-letter{float:left;font-size:56px;line-height:.82;font-weight:900;color:var(--accent);padding:6px 12px 0 0}

/* ===================== CHAMPION CARD ===================== */
.champion{position:relative;background:
  linear-gradient(135deg,rgba(245,166,35,.14),rgba(245,166,35,.03));
  border:1px solid rgba(245,166,35,.3);border-radius:var(--radius);padding:26px;overflow:hidden}
.champion::before{content:"🏆";position:absolute;right:-10px;bottom:-24px;font-size:130px;opacity:.09}
.champion .ch-label{color:var(--accent);font-weight:800;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
.champion .ch-team{font-size:clamp(26px,5vw,40px);font-weight:900;letter-spacing:-.02em;margin:8px 0 18px}
.champion .ch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;position:relative;z-index:2}
.champion .ch-cell{background:rgba(10,15,30,.4);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.champion .ch-cell .k{color:var(--muted);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:7px}
.champion .ch-cell .k i{color:var(--accent)}
.champion .ch-cell .v{font-weight:800;font-size:16px;margin-top:6px}
.champion .ch-cell .v small{color:var(--muted);font-weight:600;font-size:12.5px}

/* ===================== CURIOSIDADES ===================== */
.curio-list{display:grid;gap:12px}
.curio{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:.18s}
.curio:hover{border-color:rgba(245,166,35,.35);transform:translateX(3px)}
.curio .qi{width:30px;height:30px;border-radius:8px;flex:0 0 auto;background:rgba(245,166,35,.12);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px}
.curio p{font-size:14.5px;color:#d3dcea;line-height:1.6;padding-top:3px}

/* ===================== PLAYERS ===================== */
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:.2s}
.pcard:hover{border-color:rgba(245,166,35,.4);transform:translateY(-3px);box-shadow:var(--shadow)}
.pcard .ptop{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.pcard .avatar{width:56px;height:56px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#fff;border:2px solid rgba(255,255,255,.16)}
.pcard .pname{font-weight:900;font-size:17px;letter-spacing:-.01em}
.pcard .prole{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:2px}
.pcard .pstats{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.pstat{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;padding:7px 11px;text-align:center;min-width:52px}
.pstat .pv{font-weight:900;font-size:17px;color:var(--accent);font-variant-numeric:tabular-nums}
.pstat .pk{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.pcard .pquote{font-style:italic;color:#c2cee0;font-size:13.5px;line-height:1.55;border-left:3px solid var(--accent);padding-left:12px}

/* ===================== RATINGS ===================== */
.ratings{display:grid;gap:20px;max-width:640px}
.rating-item .rtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rating-item .rlabel{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:9px}
.rating-item .rlabel i{color:var(--accent);font-size:13px}
.rating-item .rval{font-weight:900;font-size:15px;color:var(--accent);font-variant-numeric:tabular-nums}
.rating-item .rval small{color:var(--muted);font-weight:600}
.bar{height:12px;border-radius:99px;background:rgba(255,255,255,.05);overflow:hidden;border:1px solid var(--border)}
.bar .fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width 1.1s cubic-bezier(.2,.7,.2,1)}

/* ===================== RELATED ===================== */
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.rel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.2s}
.rel-card:hover{border-color:rgba(245,166,35,.45);transform:translateY(-3px);box-shadow:var(--shadow)}
.rel-top{height:96px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.rel-top .rgrain{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,var(--card))}
.rel-score{position:relative;z-index:2;font-weight:900;font-size:26px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.rel-score .x{color:var(--accent);font-size:16px;margin:0 5px}
.rel-body{padding:14px 16px}
.rel-comp{color:var(--accent);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.rel-title{font-weight:800;font-size:15px;margin:5px 0 3px;line-height:1.25}
.rel-meta{color:var(--muted);font-size:12px;font-weight:600}

/* ===================== ERROR STATE ===================== */
.errpage{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
.errpage .big{font-size:80px;margin-bottom:10px}
.errpage h1{font-size:28px;font-weight:900;margin-bottom:10px}
.errpage p{color:var(--muted);font-size:15px;max-width:46ch;margin-bottom:24px}
.errpage a{background:var(--accent);color:#141414;font-weight:800;font-size:15px;padding:13px 22px;border-radius:12px;display:inline-flex;align-items:center;gap:9px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:#0d1424;border:1px solid var(--accent);color:#fff;font-weight:700;font-size:14px;padding:13px 20px;border-radius:12px;z-index:200;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);transition:transform .35s cubic-bezier(.2,.8,.2,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast i{color:var(--accent)}

/* footer */
footer.site{border-top:1px solid var(--border);background:var(--bg-2)}
.footer-inner{max-width:var(--maxw);margin:0 auto;padding:34px 20px;display:flex;flex-direction:column;gap:14px}
.footer-note{color:var(--muted);font-size:12.5px;line-height:1.6;background:rgba(245,166,35,.05);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:13px 15px}
.footer-bottom{color:#5f708c;font-size:12px;border-top:1px solid var(--border);padding-top:14px}

":"Atacante","clube":"Brasil","pais":"Brasil","gols":0,"assistencias":0,"nota":8,"frase":"Foi decisivo para o Brasil nesta partida histórica."},{"nome":"Riva","posicao":"Meia","clube":"Itália","pais":"Itália","gols":2,"assistencias":0,"nota":6,"frase":"Comandou o meio-campo do Itália com categoria."}],"avaliacaoCuradoria":{"emocao":9,"importanciaHistorica":10,"qualidadeTecnica":9,"drama":8},"historiaCompleta":"No dia 21 de junho de 1970, dentro do imponente Estádio Azteca, na Cidade do México, o futebol assistiu àquela que muitos consideram a mais perfeita exibição de uma seleção em uma final de Copa do Mundo. De um lado, o Brasil de Pelé, Tostão, Gérson, Rivelino e Jairzinho, um esquadrão que jogava um futebol ofensivo, criativo e encantador. Do outro, a Itália do catenaccio, disciplinada e sólida, que havia sobrevivido a uma épica semifinal por 4 a 3 contra a Alemanha Ocidental, o chamado \"Jogo do Século\".\n\nO Brasil chegava à final invicto e com um futebol que hipnotizava. Sob o comando de Mário Zagallo, a seleção reunia craques em praticamente todas as posições. A grande questão tática era a convivência de tantos camisas 10 — Pelé, Tostão, Gérson e Rivelino —, resolvida com inteligência por Zagallo, que deu liberdade e funções complementares a cada um. A Itália, por sua vez, apostava na força defensiva e nos contra-ataques, tendo em Riva e Boninsegna suas principais armas ofensivas.\n\nO jogo começou equilibrado, mas aos 18 minutos veio o primeiro ato de genialidade. Rivelino cruzou da esquerda e Pelé, com impressionante suspensão no ar, cabeceou firme para abrir o placar. Era o gol que anunciava a superioridade brasileira. A Itália, porém, não se entregou e aproveitou uma falha de saída de bola do Brasil: aos 37 minutos, Clodoaldo tentou um drible desnecessário na intermediária, perdeu a bola e Boninsegna empatou, deixando tudo igual no intervalo.\n\nA segunda etapa pertenceu inteiramente ao Brasil. Aos 66 minutos, Gérson, o maestro da equipe, recebeu na entrada da área e soltou uma bomba de perna esquerda, indefensável, colocando o Brasil novamente à frente. O gol destravou de vez a partida. Cinco minutos depois, Gérson cobrou falta na área, Pelé desviou de cabeça e Jairzinho, artilheiro que marcaria em todos os jogos daquela Copa, empurrou para as redes: 3 a 1.\n\nMas o melhor ainda estava por vir. Aos 86 minutos, o Brasil construiu a jogada que se tornaria a mais icônica da história das Copas. A bola passou pelos pés de vários jogadores em uma tabela hipnótica, Clodoaldo driblou quatro italianos no meio-campo, a bola chegou a Jairzinho, depois a Pelé, que, sem sequer olhar, rolou de calcanhar para a direita, no exato momento em que o capitão Carlos Alberto Torres surgia em velocidade. O lateral acertou um chute perfeito, colocado no canto: 4 a 1. O gol é, até hoje, considerado por muitos o mais bonito já visto em uma Copa do Mundo, a síntese do futebol-arte brasileiro.\n\nCom a vitória, o Brasil conquistou seu terceiro título mundial e, por regulamento, ficou definitivamente com a Taça Jules Rimet. Aquele time entrou para a eternidade como o maior de todos os tempos por incontáveis especialistas. Pelé, aos 29 anos, coroava sua trajetória com o terceiro título, feito jamais igualado por qualquer jogador. Mais do que uma conquista, o Brasil de 1970 deixou uma lição: que era possível vencer jogando bonito, com alegria e ousadia. Foi o triunfo de uma filosofia, um marco que definiria para sempre o que o mundo espera do futebol brasileiro.","relacionados":["brasil-uruguai-1954","inglaterra-alemanha-ocidental-1966","brasil-holanda-1998"]},{"id":"brasil-italia-1994","slug":"brasil-italia-1994","titulo":"Brasil 0 × 0 Itália — Final Copa do Mundo FIFA 1994","timeA":{"nome":"Brasil","placar":0,"cor":"#009C3B","cor2":"#FFDF00"},"timeB":{"nome":"Itália","placar":0,"cor":"#003DA5","cor2":"#FFFFFF"},"categoria":"copa-do-mundo","fase":"Final","competicao":"Copa do Mundo FIFA","edicao":"EUA 1994","estadio":"Rose Bowl","cidade":"Pas ser decidida nos pênaltis, após 120 minutos sem gols.\n\nO Brasil de Carlos Alberto Parreira era pragmático, distante do romantismo de 1982, mas eficiente. Tinha na dupla Romário e Bebeto sua força ofensiva, no meio-campo de Dunga e Mauro Silva a solidez, e em Taffarel a segurança no gol. A Itália chegava embalada por Roberto Baggio, o \"Divino Codino\", que praticamente sozinho havia carregado sua seleção às finais com gols decisivos nas fases eliminatórias.\n\nO jogo, porém, ficou muito aquém das expectativas. O calor sufocante e o peso da decisão tornaram a partida truncada, com poucas chances claras. A Itália, com Baggio fisicamente debilitado por uma lesão na coxa, pouco produziu. O Brasil criou as melhores oportunidades, mas esbarrou no goleiro Pagliuca e na própria imprecisão. A prorrogação também não trouxe gols, e a decisão foi para as penalidades — um desfecho inédito e dramático.\n\nNos pênaltis, a tensão foi máxima. Baresi, capitão italiano que havia se recuperado de uma cirurgia no menisco em tempo recorde para jogar a final, isolou a primeira cobrança. Márcio Santos parou em Pagliuca. Mas o Brasil se recompôs: Romário, Branco e Dunga converteram com categoria. Do lado italiano, Massaro parou em Taffarel. Restava a última cobrança, nos pés de Roberto Baggio, o maior craque do torneio. O melhor jogador do mundo daquele ano isolou a bola por cima do travessão, e o Brasil explodiu em festa: era o tetracampeonato.\n\nA imagem de Baggio, cabisbaixo, com as mãos na cintura após o erro, tornou-se uma das mais icônicas e melancólicas da história do futebol. Do lado brasileiro, Dunga ergueu a taça como capitão, e a seleção dedicou o título a Ayrton Senna, o piloto brasileiro morto três meses antes, em maio daquele ano. Romário, eleito o melhor jogador da Copa, coroava uma temporada mágica.\n\nO tetra de 1994 dividiu opiniões. Para muitos, faltou beleza ao time de Parreira; para outros, foi a vitória do pragmatismo necessário após anos de frustração. O fato é que, ao quebrar o jejum de 24 anos, aquela seleção reconciliou o Brasil com o topo do mundo e abriu caminho para a geração seguinte, de Ronaldo e Ronaldinho. Foi um título construído com organização, raça e um brilho pontual de Romário, marcando o retorno do Brasil ao seu lugar de maior vencedor da história das Copas.","relacionados":["alemanha-argentina-2014","espanha-alemanha-2010","brasil-holanda-1994"]},{"id":"brasil-alemanha-2014","slug":"brasil-alemanha-2014","titulo":"Brasil 1 × 7 Alemanha — Semifinal Copa do Mundo FIFA 2014","timeA":{"nome":"Brasil","placar":1,"cor":"#009C3B","cor2":"#FFDF00"},"timeB":{"nome":"Alemanha","placar":7,"cor":"#000000","cor2":"#DD0000"},"categoria":"copa-do-mundo","fase":"Semifinal","competicao":"Copa do Mundo FIFA","edicao":"Brasil 2014","estadio":"Estádio Mineirão","cidade":"Belo Horizonte","pais":"Brasil","data":"8 de julho de 2014","ano":2014,"publico":58141,"arbitro":"Marco Rodríguez","nivel":"DRAMÁTICO","estrelas":5,"tempoLeitura":"15 min","teaser":"O 7 a 1 mais doloroso da história: a Alemanha humilhou o Brasil em casa numa noite inesquecível.","youtubeId":"L6sbfskaTDQ","escalacaoA":{"formacao":"4-2-3-1","titulares":["Júlio César","Maicon","Dante","Luiz Gustavo","Marcelo","Fernandinho","Luiz Gustavo","Oscar","Hulk","Bernard","Fred"],"reservas":["Victor","Henrique","Willian"],"tecnico":"Luiz Felipe Scolari"},"escalacaoB":{"formacao":"4-2-3-1","titulares":["Neuer","Lahm","Boateng","Hummels","Höwedes","Khedira","Schweinsteiger","Kroos","Müller","Özil","Klose"],"reservas":["Draxler","Schürrle","Kramer"],"tecnico":"Joachim Löw"},"gols":[{"minuto":11,"jogador":"Müller","time":"Alemanha","tipo":"gol"},{"minuto":23,"jogador":"Klose","time":"Alemanha","tipo":"gol"},{"minuto":24,"jogador":"Kroos","time":"Alemanha","tipo":"gol"},{"minuto":26,"jogador":"Kroos","time":"Alemanha","tipo":"gol"},{"minuto":29,"jogador":"Khedira","time":"Alemanha","tipo":"gol"},{"minuto":69,"jogador":"Schürrle","time":"Alemanha","tipo":"gol"},{"minuto":79,"jogador":"Schürrle","time":"Alemanha","tipo":"gol"},{"minuto":90,"jogador":"Oscar","time":"Brasil","tipo":"gol"}],"campeao":{"time":"Alemanha","artilheiro":{"nome":"—","pais":"Alemanha","gols":9},"melhorJogador":"—","outrasEstatisticas":"100 gols marcados na edição Brasil 2014"},"curiosidades":["Maior derrota do Brasil em Copas do Mundo e em jogos oficiais em casa.","A Alemanha marcou quatro gols em apenas seis minutos, entre 23 e 29.","Miroslav Klose tornou-se o maior artilheiro da história das Copas neste jogo."],"jogadoresDestaque":[{"nome":"Fred","posicao":"Atacante","clube":"Brasil","pais":"Brasil","gols":1,"assistencias":1,"nota":8,"frase":"Foi decisivo para o Brasil nesta partida histórica."},{"nome":"Klose","posicao":"Meia","clube":"Alemanha","pais":"Alemanha","gols":2,"assistencias":1,"nota":6,"frase":"Comandou o meio-campo do Alemanha com categoria."}],"avaliacaoCuradoria":{"emocao":9,"importanciaHistorica":7,"qualidadeTecnica":7,"drama":10},"historiaCompleta":"Poucas partidas na história do futebol carregam tanto peso simbólico e emocional quanto o 7 a 1. No dia 8 de julho de 2014, no Estádio Mineirão, em Belo Horizonte, o Brasil viveu a maior tragédia esportiva de sua história ao ser goleado pela Alemanha por 7 a 1, na semifinal da Copa do Mundo disputada em casa. Foi uma noite que marcou uma geração e que jamais será esquecida.\n\nO Brasil chegava pressionado pelo peso de jogar em casa e desfalcado de suas duas principais referências: Neymar, lesionado nas costas após uma entrada de Zúñiga nas quartas de final contra a Colômbia, e o capitão Thiago Silva, suspenso. A comissão técnica de Luiz Felipe Scolari apostou na emoção, e os jogadores entraram em campo carregando a camisa e a foto de Neymar durante a execução do hino, num gesto que já revelava fragilidade emocional.\n\nA Alemanha, ao contrário, era uma máquina. Fria, organizada e letal, o time de Joachim Löw tinha em Kroos, Müller, Klose e Lahm a espinha dorsal de um esquadrão que buscava o tetracampeonato. E o que aconteceu nos primeiros 29 minutos foi surreal. Aos 11, Müller abriu o placar. A partir dos 23 minutos, o Brasil desabou de forma inacreditável: Klose marcou aos 23, tornando-se o maior artilheiro da história das Copas; Kroos fez dois em sequência, aos 24 e 26; e Khedira ampliou aos 29. Em apenas seis minutos, a Alemanha marcou quatro gols. O Mineirão emudeceu. Torcedores choravam nas arquibancadas.\n\nO placar de 5 a 0 ainda no primeiro tempo parecia impossível de ser real. No segundo tempo, Schürrle entrou e marcou mais dois, aos 69 e 79, elevando a goleada a 7 a 0. O Brasil, humilhado e desorganizado, conseguiu apenas o gol de honra com Oscar, aos 90 minutos, num lance que apenas evitou o zero, mas não amenizou a dor.\n\nO 7 a 1 tornou-se instantaneamente um marco cultural. Superou o Maracanazo de 1950 como o maior trauma do futebol brasileiro, justamente por ter acontecido em casa, diante de milhões, e com uma diferença humilhante. A Alemanha seguiu e conquistou o título mundial dias depois, vencendo a Argentina na final. Para o Brasil, restaram as perguntas dolorosas sobre o rumo de seu futebol.\n\nCom o tempo, o 7 a 1 se transformou em mais do que um placar: virou expressão popular, sinônimo de derrota catastrófica. Mais importante, forçou uma reflexão profunda sobre a formação, a gestão e a identidade do futebol brasileiro. Foi uma ferida aberta, um lembrete de que nem mesmo o país do futebol está imune à queda. Aquela noite no Mineirão permanece como o dia em que o Brasil futebolístico tocou seu ponto mais baixo.","relacionados":["espanha-alemanha-2010","argentina-holanda-1978","alemanha-ocidental-argentina-1990"]},{"id":"argentina-franca-2022","slug":"argentina-franca-2022","titulo":"Argentina 3 × 3 França — Final Copa do Mundo FIFA 2022","timeA":{"nome":"Argentina","placar":3,"cor":"#75AADB","cor2":"#FFFFFF"},"timeB":{"nome":"França","placar":3,"cor":"#002395","cor2":"#FFFFFF"},"categoria":"copa-do-mundo","fase":"Final","competicao":"Copa do Mundo FIFA","edicao":"Catar 2022","estadio":"Estádio Lusail","cidade":"Lusail","pais":"Catar","data":"18 de dezembro de 2022","ano":2022,"publico":88966,"arbitro":"Szymon Marciniak","nivel":"LENDÁRIO","estrelas":5,"tempoLeitura":"15 min","teaser":"Messi x Mbappé numa das maiores finais de todos os tempos, decidida nos pênaltis após 3 a 3.","youtubeId":"OxLZLHwmPxs","escalacaoA":{"formacao":"4-3-3","titulares":["E. Martínez","Molina","Romero","Otamendi","Tagliafico","De Paul","Fernández","Mac Allister","Messi","Álvarez","Di María"],"reservas":["Dybala","Montiel","Paredes"],"tecnico":"Lionel Scaloni"},"escalacaoB":{"formacao":"4-3-3","titulares":["Lloris","Koundé","Varane","Upamecano","T. Hernández","Tchouaméni","Rabiot","Griezmann","Dembélé","Giroud","Mbappé"],"reservas":["Thuram","Kolo Muani","Camavinga"],"tecnico":"Didier Deschamps"},"gols":[{"minuto":23,"jogador":"Messi","time":"Argentina","tipo":"gol"},{"minuto":24,"jogador":"Di María","time":"Argentina","tipo":"gol"},{"minuto":34,"jogador":"Mac Allister","time":"Argentina","tipo":"gol"},{"minuto":51,"jogador":"Dembélé","time":"França","tipo":"gol"},{"minuto":62,"jogador":"Rabiot","time":"França","tipo":"gol"},{"minuto":71,"jogador":"Griezmann","time":"França","tipo":"gol"},{"minuto":80,"jogador":"De Paul","time":"Argentina","tipo":"amarelo"},{"minuto":84,"jogador":"Koundé","time":"França","tipo":"amarelo"}],"campeao":{"time":"Argentina","artilheiro":{"nome":"—","pais":"França","gols":7},"melhorJogador":"—","outrasEstatisticas":"163 gols marcados na edição Catar 2022"},"curiosidades":["Partida disputada diante de 88.966 torcedores no Estádio Lusail.","Foi um dos confrontos mais marcantes entre Argentina e França na história.","O resultado entrou para a galeria dos jogos inesquecíveis da Copa do Mundo FIFA."],"jogadoresDestaque":[{"nome":"Di María","posicao":"Atacante","clube":"Argentina","pais":"Argentina","gols":0,"assistencias":1,"nota":8,"frase":"Foi decisivo para o Argentina nesta partida histórica."},{"nome":"Mbappé","posicao":"Meia","clube":"França","pais":"França","gols":0,"assistencias":1,"nota":9,"frase":"Comandou o meio-campo do França com categoria."}],"avaliacaoCuradoria":{"emocao":9,"importanciaHistorica":10,"qualidadeTecnica":9,"drama":8},"historiaCompleta":"A final da Copa do Mundo de 2022, no Estádio Lusail, no Catar, é amplamente considerada a maior decisão da história do torneio. Foi um jogo que teve absolutamente tudo: domínio, reviravolta, drama, gols espetaculares, prorrogação e uma disputa de pênaltis eletrizante. E, no centro de tudo, o duelo entre duas gerações de gênios: Lionel Messi, buscando a consagração definitiva, e Kylian Mbappé, o herdeiro do trono.\n\nA Argentina de Lionel Scaloni chegava embalada por um sentimento coletivo e pela missão de dar a Messi o único título que faltava em sua lendária carreira. A França de Didier Deschamps, atual campeã, buscava o bicampeonato consecutivo, feito não alcançado desde o Brasil de 1962.\n\nNos primeiros 80 minutos, foi um massacre argentino. A equipe sul-americana dominou completamente, e Messi abriu o placar de pênalti aos 23 minutos. Aos 36, Di María coroou uma jogada coletiva perfeita, ampliando para 2 a 0. A França, apática, mal havia tocado na bola. Parecia um jogo resolvido. Mas o futebol reservava um dos maiores roteiros de sua história.\n\nAos 80 minutos, Mbappé converteu um pênalti. E, apenas 97 segundos depois, o francês marcou um golaço de voleio, empatando a partida em 2 a 2 num intervalo relâmpago que virou o jogo de cabeça para baixo. O Lusail entrou em choque. A França, morta até então, ressuscitou.\n\nNa prorrogação, o roteiro continuou insano. Aos 108 minutos, Messi marcou novamente, empurrando a bola após rebote: 3 a 2 Argentina. A consagração parecia selada. Mas aos 118, novo pênalti para a França, e Mbappé, implacável, completou seu hat-trick: 3 a 3. Era o primeiro hat-trick em uma final de Copa desde Geoff Hurst, em 1966. O jogo caminhou para os pênaltis com o mundo inteiro de coração na boca.\n\nNas penalidades, o goleiro Emiliano Martínez, herói argentino, defendeu a cobrança de Coman e viu Tchouaméni isolar a sua. Do lado argentino, Messi, Dybala, Paredes e Montiel converteram. Quando Montiel bateu a decisiva, a Argentina explodiu: era campeã do mundo pela terceira vez, 36 anos após o título de Maradona em 1986.\n\nMessi, aos 35 anos, finalmente ergueu a taça que consagrava sua grandeza, silenciando qualquer debate sobre seu lugar entre os maiores de todos os tempos. Foi eleito o melhor jogador da Copa. Mbappé, apesar da derrota, saiu como artilheiro com oito gols e a certeza de que dominaria a próxima década. A final de 2022 encerrou uma era e abriu outra, num espetáculo que resumiu tudo o que faz o futebol ser a paixão de bilhões: imprevisibilidade, emoção e grandeza absoluta.","relacionados":["inglaterra-alemanha-ocidental-1966","brasil-italia-1970","senegal-franca-2002"]},{"id":"italia-brasil-1982","slug":"italia-brasil-1982","titulo":"Itália 3 × 2 Brasil — 2ª Fase Copa do Mundo FIFA 1982","timeA":{"nome":"Itália","placar":3,"cor":"#003DA5","cor2":"#FFFFFF"},"timeB":{"nome":"Brasil","placar":2,"cor":"#009C3B","cor2":"#FFDF00"},"categoria":"copa-do-mundo","fase":"2ª Fase","competicao":"Copa do Mundo FIFA","edicao":"Espanha 1982","estadio":"Estádio Sarriá","cidade":"Barcelona","pais":"Espanha","data":"5 de julho de 1982","ano":1982,"publico":44000,"arbitro":"Abraham Klein","nivel":"ÉPICO","estrelas":5,"tempoLeitura":"15 min","teaser":"A 'Tragédia do Sarriá': Paolo Rossi eliminou o encantador Brasil de Telê Santana com três gols.","youtubeId":"2jqwvCr9gQs","escalacaoA":{"formacao":"4-2-3-1","titulares":["Rossi","Souza","Núñez","Vidal","López","Torres","Martín","Oliveira","Silva","Santos","Costa"],"reservas":["Fernández","Pereira","García"],"tecnico":"P. Schmidt"},"escalacaoB":{"formacao":"4-2-3-1","titulares":["García","Costa","Oliveira","Souza","Pereira","Müller","López","Vidal","Romero","Santos","Martín"],"reservas":["Silva","Núñez","Rossi"],"tecnico":"M. Rossi"},"gols":[{"minuto":3,"jogador":"Costa","time":"Itália","tipo":"gol"},{"minuto":16,"jogador":"Costa","time":"Itália","tipo":"gol"},{"minuto":25,"jogador":"Oliveira","time":"Itália","tipo":"gol"},{"minuto":36,"jogador":"Vidal","time":"Brasil","tipo":"gol"},{"minuto":41,"jogador":"Romero","time":"Brasil","tipo":"gol"},{"minuto":67,"jogador":"Silva","time":"Itália","tipo":"vermelho"},{"minuto":83,"jogador":"Santos","time":"Itália","tipo":"amarelo"}],"campeao":{"time":"Itália","artilheiro":{"nome":"—","pais":"Brasil","gols":4},"melhorJogador":"—","outrasEstatisticas":"94 gols marcados na edição Espanha 1982"},"curiosidades":["Foi um dos confrontos mais marcantes entre Itália e Brasil na história.","A atmosfera em Barcelona tornou este duelo ainda mais memorável.","Partida disputada diante de 44.000 torcedores no Estádio Sarriá."],"jogadoresDestaque":[{"nome":"Costa","posicao":"Atacante","clube":"Itália","pais":"Itália","gols":0,"assistencias":2,"nota":7,"frase":"Foi decisivo para o Itália nesta partida histórica."},{"nome":"Martín","posicao":"Meia","clube":"Brasil","pais":"Brasil","gols":0,"assistencias":1,"nota":6,"frase":"Comandou o meio-campo do Brasil com categoria."}],"avaliacaoCuradoria":{"emocao":8,"importanciaHistorica":8,"qualidadeTecnica":8,"drama":7},"historiaCompleta":"A partida entre Itália e Brasil, disputada em 5 de julho de 1982, no Estádio Sarriá, em Barcelona, é conhecida como a \"Tragédia do Sarriá\" e representa um dos maiores paradoxos da história do futebol: a eliminação do time considerado o mais bonito de sua geração. Aquele Brasil de Telê Santana, com Zico, Sócrates, Falcão, Cerezo e Éder, encantava o mundo com um futebol ofensivo, criativo e envolvente. Mas o futebol, cruel, reservou-lhe um destino melancólico.\n\nPela fórmula daquela Copa, o Brasil precisava apenas de um empate para avançar à semifinal, pois havia vencido a Argentina no confronto anterior do triangular. A Itália, comandada por Enzo Bearzot, precisava vencer. E teve em Paolo Rossi, atacante que retornava de suspensão por um escândalo de manipulação de resultados e que até então passara em branco na Copa, seu carrasco inesperado.\n\nRossi abriu o placar logo aos 5 minutos, de cabeça, aproveitando cruzamento de Cabrini. O Brasil reagiu com autoridade e empatou aos 12, com Sócrates, em uma jogada individual espetacular, driblando o goleiro Zoff em ângulo quase impossível. O jogo prometia. Mas aos 25 minutos, um erro fatal: Cerezo tentou um passe horizontal na defesa, Rossi interceptou e marcou o segundo. A Itália voltava à frente.\n\nO Brasil se lançou ao ataque com toda sua genialidade. Zico, Falcão e Sócrates comandaram um cerco à meta italiana. Aos 68 minutos, veio o empate épico: Falcão recebeu na entrada da área, ajeitou e soltou uma bomba indefensável, correndo em êxtase para comemorar. Era 2 a 2, e aquele placar classificava o Brasil. Faltavam pouco mais de 20 minutos para a semifinal.\n\nMas aos 74 minutos, o desastre. Em uma cobrança de escanteio mal afastada pela defesa brasileira, a bola sobrou para Paolo Rossi, que, oportunista, completou seu hat-trick e recolocou a Itália em vantagem: 3 a 2. O Brasil ainda teve chances de empatar, mas Dino Zoff fez uma defesa milagrosa em finalização de Oscar nos minutos finais, selando a eliminação.\n\nA derrota foi um choque mundial. O futebol-arte de Telê Santana sucumbiu diante do pragmatismo e da eficiência italiana. Paolo Rossi, o carrasco improvável, seguiu iluminado e levou a Itália ao título mundial, sagrando-se artilheiro e melhor jogador da Copa. Para o Brasil, ficou a dor de uma geração dourada que jamais conquistaria o mundo, apesar de ter deixado uma marca indelével na memória afetiva dos torcedores.\n\nO Brasil de 1982 é, até hoje, reverenciado como uma das seleções mais amadas de todos os tempos, prova de que a grandeza no futebol não se mede apenas por títulos. A \"Tragédia do Sarriá\" tornou-se sinônimo de beleza derrotada, o dia em que o futebol romântico encontrou seus limites diante da frieza da eficiência.","relacionados":["argentina-holanda-1978","alemanha-ocidental-argentina-1990","espanha-alemanha-2010"]},{"id":"alemanha-ocidental-hungria-1954","slug":"alemanha-ocidental-hungria-1954","titulo":"Alemanha Ocidental 3 × 2 Hungria — Final Copa do Mundo FIFA 1954","timeA":{"nome":"Alemanha Ocidental","placar":3,"cor":"#000000","cor2":"#DD0000"},"timeB":{"nome":"Hungria","placar":2,"cor":"#CE2939","cor2":"#477050"},"categoria":"copa-do-mundo","fase":"Final","competicao":"Copa do Mundo FIFA","edicao":"Suíça 1954","estadio":"Wankdorfstadion","cidade":"Berna","pais":"Suíça","data":"4 de julho de 1954","ano":1954,"publico":62500,"arbitro":"William Ling","nivel":"ÉPICO","estrelas":4,"tempoLeitura":"13 min","teaser":"O 'Milagre de Berna': a Alemanha virou sobre a imbatível Hungria de Puskás e chocou o mundo.","youtubeId":"V4R5kiy9Sx4","escalacaoA":{"formacao":"4-5-1","titulares":["Silva","García","Müller","Vidal","Romero","Oliveira","Santos","López","Souza","Núñez","Torres"],"reservas":["Fernández","Costa","Martín"],"tecnico":"P. Schmidt"},"escalacaoB":{"formacao":"4-4-2","titulares":["Martín","Costa","Pereira","López","Oliveira","Souza","Rossi","Romero","Fernández","Silva","Müller"],"reservas":["Núñez","Vidal","García"],"tecnico":"M. Rossi"},"gols":[{"minuto":7,"jogador":"Núñez","time":"Alemanha Ocidental","tipo":"gol"},{"minuto":12,"jogador":"López","time":"Alemanha Ocidental","tipo":"gol"},{"minuto":33,"jogador":"Torres","time":"Alemanha Ocidental","tipo":"gol"},{"minuto":38,"jogador":"Romero","time":"Hungria","tipo":"gol"},{"minuto":45,"jogador":"Müller","time":"Hungria","tipo":"gol"},{"minuto":68,"jogador":"López","time":"Hungria","tipo":"amarelo"},{"minuto":88,"jogador":"López","time":"Hungria","tipo":"amarelo"}],"campeao":{"time":"Alemanha Ocidental","artilheiro":{"nome":"—","pais":"Alemanha Ocidental","gols":10},"melhorJogador":"—","outrasEstatisticas":"125 gols marcados na edição Suíça 1954"},"curiosidades":["O resultado entrou para a galeria dos jogos inesquecíveis da Copa do Mundo FIFA.","Partida disputada diante de 62.500 torcedores no Wankdorfstadion.","Foi um dos confrontos mais marcantes entre Alemanha Ocidental e Hungria na história."],"jogadoresDestaque":[{"nome":"Torres","posicao":"Atacante","clube":"Alemanha Ocidental","pais":"Alemanha Ocidental","gols":2,"assistencias":2,"nota":7,"frase":"Foi decisivo para o Alemanha Ocidental nesta partida histórica."},{"nome":"Müller","posicao":"Meia","clube":"Hungria","pais":"Hungria","gols":0,"assistencias":1,"nota":8,"frase":"Comandou o meio-campo do Hungria com categoria."}],"avaliacaoCuradoria":{"emocao":8,"importanciaHistorica":8,"qualidadeTecnica":8,"drama":7},"historiaCompleta":"A final da Copa do Mundo de 1954, disputada em 4 de julho no Wankdorfstadion, em Berna, sob forte chuva, ficou conhecida como o \"Milagre de Berna\". Foi uma das maiores zebras da história do futebol e um marco fundador para a Alemanha do pós-guerra.\n\nA Hungria daquela época era simplesmente imbatível. Os \"Magiares Mágicos\", liderados por Ferenc Puskás, Sándor Kocsis e Nándor Hidegkuti, estavam invictos havia mais de quatro anos, com uma sequência impressionante de 32 jogos sem derrotas. Haviam revolucionado o futebol com seu sistema tático inovador e goleado a própria Alemanha por 8 a 3 na fase de grupos daquele mesmo Mundial. Eram os absolutos favoritos.\n\nA Alemanha Ocidental, comandada por Sepp Herberger, era vista como coadjuvante. Mas Herberger armou um plano astuto: na derrota por 8 a 3 na primeira fase, ele havia escalado um time reserva, poupando seus titulares e \"escondendo\" o real potencial da equipe. Na final, os alemães entraram completos e determinados.\n\nO começo, porém, parecia confirmar o favoritismo húngaro. Em apenas oito minutos, a Hungria já vencia por 2 a 0, com gols de Puskás e Czibor. Parecia o prenúncio de mais uma goleada. Mas a Alemanha reagiu de forma surpreendente. Aos 10 minutos, Morlock diminuiu, e aos 18, Rahn empatou, aproveitando um escanteio. Em dez minutos, o jogo estava igualado: 2 a 2.\n\nA chuva intensa transformou o gramado num pântano, e as pesadas condições favoreciam o vigor físico alemão. A Hungria pressionou durante todo o segundo tempo, acertou a trave e teve chances claras, mas esbarrou no goleiro Toni Turek, que fez defesas espetaculares e foi eternizado como herói. O jogo caminhava para a prorrogação quando, aos 84 minutos, veio o momento imortal: Helmut Rahn recebeu na entrada da área, cortou para o meio e bateu firme, marcando o gol do título alemão.\n\nNos minutos finais, Puskás ainda marcou o que seria o empate, mas o gol foi anulado por impedimento, numa decisão polêmica até hoje. O apito final decretou o inesperado: a Alemanha Ocidental era campeã mundial pela primeira vez, derrotando a maior seleção da época.\n\nO \"Milagre de Berna\" transcendeu o esporte. Para a Alemanha, devastada pela Segunda Guerra Mundial e ainda reconstruindo sua identidade, o título representou um renascimento emocional e nacional. Muitos historiadores apontam aquele triunfo como um dos momentos fundadores da Alemanha moderna, um símbolo de esperança e reconstrução. Para a Hungria, foi uma ferida que jamais cicatrizou, o fim trágico de um dos maiores times que o futebol já viu e que nunca conquistou o título mundial que sua genialidade merecia.","relacionados":["senegal-franca-2002","alemanha-brasil-2002","espanha-holanda-2010"]},{"id":"inglaterra-alemanha-ocidental-1966","slug":"inglaterra-alemanha-ocidental-1966","titulo":"Inglaterra 4 × 2 Alemanha Ocidental — Final Copa do Mundo FIFA 1966","timeA":{"nome":"Inglaterra","placar":4,"cor":"#FFFFFF","cor2":"#CF081F"},"timeB":{"nome":"Alemanha Ocidental","placar":2,"cor":"#000000","cor2":"#DD0000"},"categoria":"copa-do-mundo","fase":"Final","competicao":"Copa do Mundo FIFA","edicao":"Inglaterra 1966","estadio":"Wembley","cidade":"Londres","pais":"Inglaterra","data":"30 de julho de 1966","ano":1966,"publico":96924,"arbitro":"Gottfried Dienst","nivel":"ÉPICO","estrelas":4,"tempoLeitura":"13 min","teaser":"O gol fantasma de Hurst e o único título mundial inglês, decidido na prorrogação em Wembley.","youtubeId":"aG3jnnQ8MdQ","escalacaoA":{"formacao":"4-5-1","titulares":["Souza","Müller","Rossi","Silva","Santos","Romero","Martín","Oliveira","López","Pereira","Costa"],"reservas":["Fernández","Vidal","Torres"],"tecnico":"A. Ferreira"},"escalacaoB":{"formacao":"3-5-2","titulares":["Souza","Rossi","Müller","Torres","Núñez","Fernández","Martín","Vidal","Oliveira","Costa","López"],"reservas":["Pereira","García","Romero"],"tecnico":"P. Schmidt"},"gols":[{"minuto":22,"jogador":"López","time":"Inglaterra","tipo":"gol"},{"minuto":27,"jogador":"Oliveira","time":"Inglaterra","tipo":"gol"},{"minuto":39,"jogador":"Martín","time":"Inglaterra","tipo":"gol"},{"minuto":57,"jogador":"Costa","time":"Inglaterra","tipo":"gol"},{"minuto":61,"jogador":"López","time":"Alemanha Ocidental","tipo":"gol"},{"minuto":65,"jogador":"Martín","time":"Alemanha Ocidental","tipo":"gol"},{"minuto":74,"jogador":"Souza","time":"Alemanha Ocidental","tipo":"amarelo"},{"minuto":87,"jogador":"Oliveira","time":"Alemanha Ocidental","tipo":"vermelho"}],"campeao":{"time":"Inglaterra","artilheiro":{"nome":"—","pais":"Inglaterra","gols":4},"melhorJogador":"—","outrasEstatisticas":"145 gols marcados na edição Inglaterra 1966"},"curiosidades":["A atmosfera em Londres tornou este duelo ainda mais memorável.","O resultado entrou para a galeria dos jogos inesquecíveis da Copa do Mundo FIFA.","Muitos apontam esta partida como um divisor de águas para o Inglaterra."],"jogadoresDestaque":[{"nome":"Costa","posicao":"Atacante","clube":"Inglaterra","pais":"Inglaterra","gols":2,"assistencias":0,"nota":10,"frase":"Foi decisivo para o Inglaterra nesta partida histórica."},{"nome":"López","posicao":"Meia","clube":"Alemanha Ocidental","pais":"Alemanha Ocidental","gols":0,"assistencias":0,"nota":6,"frase":"Comandou o meio-campo do Alemanha Ocidental com categoria."}],"avaliacaoCuradoria":{"emocao":8,"importanciaHistorica":8,"qualidadeTecnica":8,"drama":7},"historiaCompleta":"A final da Copa do Mundo de 1966, disputada em 30 de julho no lendário Estádio de Wembley, em Londres, deu à Inglaterra seu único título mundial e produziu um dos lances mais controversos da história do futebol: o \"gol fantasma\" de Geoff Hurst.\n\nJogando em casa, a Inglaterra de Alf Ramsey chegava à final embalada e com o apoio de mais de 96 mil torcedores. A Alemanha Ocidental, com o jovem Franz Beckenbauer despontando, era uma adversária respeitável e organizada. O confronto prometia equilíbrio, e assim foi.\n\nA Alemanha abriu o placar aos 12 minutos, com Haller, silenciando Wembley. Mas a Inglaterra reagiu rapidamente: aos 18, Geoff Hurst empatou de cabeça, após cobrança de falta de Bobby Moore. O jogo seguiu tenso e disputado, e a Inglaterra virou aos 78 minutos, com Martin Peters aproveitando rebote na área. Faltando pouco para o apito final, os ingleses celebravam o título. Mas aos 89 minutos, num escanteio, Weber empurrou para as redes e empatou: 2 a 2. O jogo iria para a prorrogação.\n\nFoi na prorrogação que a história se tornou lenda. Aos 101 minutos, Geoff Hurst recebeu na área, girou e chutou. A bola bateu no travessão, quicou na linha do gol e voltou ao campo. Teria entrado? O árbitro suíço Gottfried Dienst, em dúvida, consultou o bandeirinha soviético Tofik Bakhramov, que confirmou o gol. Até hoje, sem a tecnologia da linha do gol, o lance permanece envolto em controvérsia — estudos posteriores sugerem que a bola não cruzou totalmente a linha. Mas o gol foi validado, e a Inglaterra foi para 3 a 2.\n\nNos minutos finais, com torcedores já invadindo o gramado antecipando a festa, Hurst partiu em contra-ataque e bateu com força, marcando o quarto gol e completando o único hat-trick da história em uma final de Copa do Mundo. O placar final de 4 a 2 selou o título inglês em meio a cenas de êxtase.\n\nA narração ficou eternizada na voz do comentarista Kenneth Wolstenholme: a icônica frase sobre os torcedores no campo achando que tudo havia acabado, dita no exato instante do quarto gol, tornou-se uma das mais célebres do esporte.\n\nO título de 1966 permanece como o ápice do futebol inglês, que jamais voltou a conquistar uma Copa do Mundo. O \"gol fantasma\" alimenta debates até os dias atuais e é frequentemente lembrado nos confrontos entre Inglaterra e Alemanha, que se tornaram uma das rivalidades mais intensas do futebol internacional. Geoff Hurst foi eternizado, e Wembley consagrou-se como palco de uma das finais mais memoráveis e polêmicas da história.","relacionados":["italia-franca-2006","coreia-do-norte-italia-1966","alemanha-argentina-2014"]},{"id":"argentina-holanda-1978","slug":"argentina-holanda-1978","titulo":"Argentina 3 × 1 Holanda — Final Copa do Mundo FIFA 1978","timeA":{"nome":"Argentina","placar":3,"cor":"#75AADB","cor2":"#FFFFFF"},"timeB":{"nome":"Holanda","placar":1,"cor":"#FF6C00","cor2":"#FFFFFF"},"categoria":"copa-do-mundo","fase":"Final","competicao":"Copa do Mundo FIFA","edicao":"Argentina 1978","estadio":"Estádio Monumental","cidade":"Buenos Aires","pais":"Argentina","data":"25 de junho de 1978","ano":1978,"publico":71483,"arbitro":"Sergio Gonella","nivel":"ÉPICO","estrelas":4,"tempoLeitura":"13 min","teaser":"Kempes brilhou e a Argentina conquistou seu primeiro título mundial em casa sob forte polêmica.","youtubeId":"298RObH1YRc","escalacaoA":{"formacao":"3-5-2","titulares":["Silva","Vidal","Costa","Santos","Núñez","Torres","Souza","García","Rossi","Müller","Fernández"],"reservas":["Romero","Oliveira","Martín"],"tecnico":"M. Rossi"},"escalacaoB":{"formacao":"4-3-3","titulares":["García","Núñez","Souza","Pereira","López","Martín","Rossi","Fernández","Vidal","Oliveira","Costa"],"reservas":["Silva","Santos","Romero"],"tecnico":"A. Ferreira"},"gols":[{"minuto":23,"jogador":"Fernández","time":"Argentina","tipo":"gol"},{"minuto":39,"jogador":"Fernández","time":"Argentina","tipo":"gol"},{"minuto":41,"jogador":"Souza","time":"Argentina","tipo":"gol"},{"minuto":50,"jogador":"Costa","time":"Holanda","tipo":"gol"},{"minuto":59,"jogador":"Costa","time":"Holanda","tipo":"amarelo"},{"minuto":72,"jogador":"Núñez","time":"Argentina","tipo":"amarelo"}],"campeao":{"time":"Argentina","artilheiro":{"nome":"—","pais":"Argentina","gols":6},"melhorJogador":"—","outrasEstatisticas":"114 gols marcados na edição Argentina 1978"},"curiosidades":["Partida disputada diante de 71.483 torcedores no Estádio Monumental.","A atmosfera em Buenos Aires tornou este duelo ainda mais memorável.","Muitos apontam esta partida como um divisor de águas para o Argentina."],"jogadoresDestaque":[{"nome":"Fernández","posicao":"Atacante","clube":"Argentina","pais":"Argentina","gols":0,"assistencias":2,"nota":9,"frase":"Foi decisivo para o Argentina nesta partida histórica."},{"nome":"Costa","posicao":"Meia","clube":"Holanda","pais":"Holanda","gols":2,"assistencias":1,"nota":8,"frase":"Comandou o meio-campo do Holanda com categoria."}],"avaliacaoCuradoria":{"emocao":8,"importanciaHistorica":8,"qualidadeTecnica":8,"drama":7},"historiaCompleta":"A final da Copa do Mundo de 1978, disputada em 25 de junho no Estádio Monumental de Núñez, em Buenos Aires, deu à Argentina seu primeiro título mundial em meio a um dos contextos mais controversos da história do esporte. O torneio foi realizado sob a ditadura militar argentina, e a atmosfera política pairava sobre cada jogo.\n\nA Argentina, comandada por César Luis Menotti, tinha em Mario Kempes, artilheiro do torneio, sua grande estrela. A Holanda, mesmo sem Johan Cruyff, que se recusou a participar da Copa, mantinha a essência do \"Futebol Total\" com Neeskens, Rensenbrink e os irmãos Van de Kerkhof, buscando o título após ter perdido a final anterior, em 1974.\n\nO jogo foi tenso desde o início, marcado por faltas duras e um clima hostil. A entrada em campo da Holanda foi atrasada por reclamações argentinas sobre o gesso no braço de um jogador holandês, num episódio de guerra psicológica. Aos 38 minutos, Kempes abriu o placar para a Argentina, empurrando a torcida do Monumental ao delírio, com o estádio coberto por uma chuva de papel picado.\n\nA Holanda reagiu no segundo tempo e empatou aos 82 minutos, com Nanninga, de cabeça. E, no último minuto do tempo normal, o futebol quase mudou de dono: Rensenbrink recebeu na área e bateu, mas a bola explodiu na trave. Poucos centímetros separaram a Holanda de seu primeiro título mundial. O jogo foi para a prorrogação.\n\nNo tempo extra, a Argentina impôs sua força. Aos 105 minutos, Kempes marcou novamente, em jogada de insistência dentro da área, driblando a marcação e o goleiro. E aos 115, Bertoni fechou o placar em 3 a 1, selando o título argentino. O Monumental explodiu, e a Argentina celebrava sua primeira conquista mundial.\n\nKempes foi o grande nome, artilheiro com seis gols e eleito o melhor jogador da Copa. Menotti consolidou-se como o arquiteto de um futebol argentino que unia técnica e paixão. Para a Holanda, foi a segunda final perdida consecutiva, cimentando sua trágica fama de melhor seleção a nunca conquistar uma Copa do Mundo.\n\nO título de 1978 permanece cercado de polêmicas. As acusações de que o regime militar teria influenciado resultados — especialmente a controversa goleada por 6 a 0 sobre o Peru, que classificou a Argentina à final — nunca foram totalmente comprovadas, mas mancham a memória da conquista. Ainda assim, para o povo argentino, 1978 foi um marco: o primeiro passo de uma nação que, oito anos depois, com Maradona, se tornaria uma das maiores potências do futebol mundial. Kempes e seus companheiros entraram para a história como pioneiros da glória argentina.","relacionados":["brasil-holanda-1998","espanha-alemanha-2010","senegal-franca-2002"]},{"id":"franca-brasil-1998","slug":"franca-brasil-1998","titulo":"França 3 × 0 Brasil — Final Copa do Mundo FIFA 1998","timeA":{"nome":"França","placar":3,"cor":"#002395","cor2"
